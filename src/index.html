                    <p className="text-sm text-slate-500">줌 {Math.round(zoomModal.zoom * 100)}%</p>
                  </div>
                  <div className="flex items-center gap-2">
                    {[-0.25, 0.25].map((d) => (
                      <button key={d} className="btn btn-outline btn-sm" onClick={() => adjustZoom(d)}>{d < 0 ? '-' : '+'}</button>
                    ))}
                    <button className="btn btn-outline btn-sm" onClick={() => setZoomModal((p) => ({ ...p, zoom: 1 }))}>100%</button>
                    <button className="btn btn-outline btn-sm" onClick={closeZoomModal}>닫기</button>
                  </div>
                </div>
                <div className="flex-1 overflow-auto bg-slate-900/90 flex items-center justify-center">
                  <img src={zoomModal.imageUrl} alt="zoom"
                    style={{ transform: `scale(${zoomModal.zoom})`, transformOrigin: 'center center' }}
                    className="max-w-none" />
                </div>
              </div>
            </div>
          )}

          {/* ── 썸네일 편집기 ────────────────────────────────────────────── */}
          {editingFrame && (
            <ThumbnailEditor
              frame={editingFrame}
              appDir={appDir}
              geminiApiKey={geminiApiKey}
              onClose={() => setEditingFrame(null)}
            />
          )}
        </div>
      );
    }

    // ─── ThumbnailEditor 헬퍼 함수 ──────────────────────────────────────────

    // 폰트 크기 자동 계산: maxWidth에 맞는 최대 폰트 크기 반환
    function calcFontSize(ctx, text, fontFamily, maxSize, maxWidth) {
      let size = maxSize;
      while (size > 36) {
        ctx.font = `${size}px ${fontFamily}`;
        if (ctx.measureText(text).width <= maxWidth) break;
        size -= 4;
      }
      return size;
    }

    // LinearBurn 사각형 채우기: 배경색 + 텍스처를 LinearBurn으로 합성
    // ctx.letterSpacing 설정 헬퍼 (Chromium 94+ 지원)
    function setLS(ctx, px) {
      if ('letterSpacing' in ctx) ctx.letterSpacing = `${px}px`;
    }

    // LinearBurn 사각형 채우기: opacity 파라미터 추가 (0~1, 기본 1.0)
    function drawBurnRect(ctx, x, y, w, h, colorHex, textureImg, opacity = 1.0) {
      const hex = colorHex.replace('#', '');
      const baseR = parseInt(hex.substring(0, 2), 16);
      const baseG = parseInt(hex.substring(2, 4), 16);
      const baseB = parseInt(hex.substring(4, 6), 16);

      const offC = document.createElement('canvas');
      offC.width = w; offC.height = h;
      const oCtx = offC.getContext('2d');
      oCtx.fillStyle = colorHex;
      oCtx.fillRect(0, 0, w, h);
      const solidData = oCtx.getImageData(0, 0, w, h);

      const texOff = document.createElement('canvas');
      texOff.width = w; texOff.height = h;
      const texCtx = texOff.getContext('2d');
      if (textureImg) {
        texCtx.fillStyle = texCtx.createPattern(textureImg, 'repeat');
        texCtx.fillRect(0, 0, w, h);
      } else {
        texCtx.fillStyle = colorHex;
        texCtx.fillRect(0, 0, w, h);
      }
      const texData = texCtx.getImageData(0, 0, w, h);

      const result = new ImageData(w, h);
      const d = solidData.data, t = texData.data, r = result.data;
      for (let i = 0; i < d.length; i += 4) {
        const bR = Math.max(0, baseR + t[i]   - 255);
        const bG = Math.max(0, baseG + t[i+1] - 255);
        const bB = Math.max(0, baseB + t[i+2] - 255);
        r[i]   = Math.round(baseR * (1 - opacity) + bR * opacity);
        r[i+1] = Math.round(baseG * (1 - opacity) + bG * opacity);
        r[i+2] = Math.round(baseB * (1 - opacity) + bB * opacity);
        r[i+3] = 255;
      }
      const resOff = document.createElement('canvas');
      resOff.width = w; resOff.height = h;
      resOff.getContext('2d').putImageData(result, 0, 0);
      ctx.drawImage(resOff, x, y);
    }

    // Multiply 블렌드 텍스트: opacity + letterSpacing 파라미터 추가
    function drawMultiplyText(ctx, text, fontFamily, fontSize, colorHex, x, y, textureImg, opacity, letterSpacing = 0) {
      if (!text) return;
      const hex = colorHex.replace('#', '');
      const baseR = parseInt(hex.substring(0, 2), 16);
      const baseG = parseInt(hex.substring(2, 4), 16);
      const baseB = parseInt(hex.substring(4, 6), 16);

      ctx.font = `${fontSize}px ${fontFamily}`;
      setLS(ctx, letterSpacing);
      const metrics = ctx.measureText(text);
      setLS(ctx, 0);
      const bx = Math.max(0, x - 5);
      const by = Math.max(0, y - Math.ceil(fontSize * 1.25) - 5);
      const bw = Math.min(1920 - bx, Math.ceil(metrics.width) + 20);
      const bh = Math.min(1080 - by, Math.ceil(fontSize * 1.6) + 10);
      if (bw <= 0 || bh <= 0) return;

      const textOff = document.createElement('canvas');
      textOff.width = bw; textOff.height = bh;
      const tCtx = textOff.getContext('2d');
      tCtx.font = `${fontSize}px ${fontFamily}`;
      tCtx.textBaseline = 'alphabetic';
      setLS(tCtx, letterSpacing);
      tCtx.fillStyle = '#FFFFFF';
      tCtx.fillText(text, x - bx, y - by);
      const textData = tCtx.getImageData(0, 0, bw, bh);

      const texOff = document.createElement('canvas');
      texOff.width = bw; texOff.height = bh;
      const texCtx = texOff.getContext('2d');
      if (textureImg) {
        texCtx.fillStyle = texCtx.createPattern(textureImg, 'repeat');
        texCtx.fillRect(0, 0, bw, bh);
      } else {
        texCtx.fillStyle = colorHex;
        texCtx.fillRect(0, 0, bw, bh);
      }
      const texData = texCtx.getImageData(0, 0, bw, bh);

      const result = new ImageData(bw, bh);
      const d = textData.data, t = texData.data, rv = result.data;
      for (let i = 0; i < d.length; i += 4) {
        if (d[i + 3] > 0) {
          rv[i]   = Math.round(baseR * (1 - opacity) + (baseR * t[i]   / 255) * opacity);
          rv[i+1] = Math.round(baseG * (1 - opacity) + (baseG * t[i+1] / 255) * opacity);
          rv[i+2] = Math.round(baseB * (1 - opacity) + (baseB * t[i+2] / 255) * opacity);
          rv[i+3] = d[i + 3];
        }
      }
      const resOff = document.createElement('canvas');
      resOff.width = bw; resOff.height = bh;
      resOff.getContext('2d').putImageData(result, 0, 0);
      ctx.drawImage(resOff, bx, by);
    }

    // LinearBurn 텍스트: opacity + letterSpacing 파라미터 추가
    function drawBurnText(ctx, text, fontFamily, fontSize, colorHex, x, y, textureImg, opacity = 1.0, letterSpacing = 0) {
      if (!text) return;
      const hex = colorHex.replace('#', '');
      const baseR = parseInt(hex.substring(0, 2), 16);
      const baseG = parseInt(hex.substring(2, 4), 16);
      const baseB = parseInt(hex.substring(4, 6), 16);

      ctx.font = `${fontSize}px ${fontFamily}`;
      setLS(ctx, letterSpacing);
      const metrics = ctx.measureText(text);
      setLS(ctx, 0);
      const bx = Math.max(0, x - 5);
      const by = Math.max(0, y - Math.ceil(fontSize * 1.25) - 5);
      const bw = Math.min(1920 - bx, Math.ceil(metrics.width) + 20);
      const bh = Math.min(1080 - by, Math.ceil(fontSize * 1.6) + 10);
      if (bw <= 0 || bh <= 0) return;

      const textOff = document.createElement('canvas');
      textOff.width = bw; textOff.height = bh;
      const tCtx = textOff.getContext('2d');
      tCtx.font = `${fontSize}px ${fontFamily}`;
      tCtx.textBaseline = 'alphabetic';
      setLS(tCtx, letterSpacing);
      tCtx.fillStyle = '#FFFFFF';
      tCtx.fillText(text, x - bx, y - by);
      const textData = tCtx.getImageData(0, 0, bw, bh);

      const texOff = document.createElement('canvas');
      texOff.width = bw; texOff.height = bh;
      const texCtx = texOff.getContext('2d');
      if (textureImg) {
        texCtx.fillStyle = texCtx.createPattern(textureImg, 'repeat');
        texCtx.fillRect(0, 0, bw, bh);
      } else {
        texCtx.fillStyle = colorHex;
        texCtx.fillRect(0, 0, bw, bh);
      }
      const texData = texCtx.getImageData(0, 0, bw, bh);

      const result = new ImageData(bw, bh);
      const d = textData.data, t = texData.data, r = result.data;
      for (let i = 0; i < d.length; i += 4) {
        if (d[i + 3] > 0) {
          const bR = Math.max(0, baseR + t[i]   - 255);
          const bG = Math.max(0, baseG + t[i+1] - 255);
          const bB = Math.max(0, baseB + t[i+2] - 255);
          r[i]   = Math.round(baseR * (1 - opacity) + bR * opacity);
          r[i+1] = Math.round(baseG * (1 - opacity) + bG * opacity);
          r[i+2] = Math.round(baseB * (1 - opacity) + bB * opacity);
          r[i+3] = d[i+3];
        }
      }

      const resOff = document.createElement('canvas');
      resOff.width = bw; resOff.height = bh;
      resOff.getContext('2d').putImageData(result, 0, 0);
      ctx.drawImage(resOff, bx, by);
    }

    // 클리핑 마스크 사각형: 색상 fill 위에 텍스처 이미지를 박스 형태로 클립
    function drawClipMaskRect(ctx, x, y, w, h, colorHex, textureImg) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();
      ctx.fillStyle = colorHex;
      ctx.fillRect(x, y, w, h);
      if (textureImg) {
        const cw = ctx.canvas.width, ch = ctx.canvas.height;
        ctx.drawImage(textureImg, 0, 0, cw, ch);
      }
      ctx.restore();
    }

    // 클리핑 마스크 텍스트: 텍스트 알파를 마스크로 텍스처 이미지를 클립
    function drawClipMaskText(ctx, text, fontFamily, fontSize, colorHex, x, y, textureImg, letterSpacing = 0) {
      if (!text) return;
      const cw = ctx.canvas.width, ch = ctx.canvas.height;
      // 오프스크린에 텍스트 → source-atop으로 텍스처 클립
      const ofc = document.createElement('canvas');
      ofc.width = cw; ofc.height = ch;
      const oCtx = ofc.getContext('2d');
      oCtx.font = `${fontSize}px ${fontFamily}`;
      oCtx.textBaseline = 'alphabetic';
      oCtx.fillStyle = colorHex;
      setLS(oCtx, letterSpacing);
      oCtx.fillText(text, x, y);
      if (textureImg) {
        oCtx.globalCompositeOperation = 'source-atop';
        oCtx.drawImage(textureImg, 0, 0, cw, ch);
      }
      ctx.drawImage(ofc, 0, 0);
    }

    // 이미지 로드 헬퍼 (Promise 반환, loadImg 캐시와 독립적으로 사용 가능)
    function loadImgDirect(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    // 실제 캔버스 드로잉 (async)
    async function drawThumbnail(canvas, frame, appDir, template, subCopy, mainCopy, loadImg,
                                  imgOffsetX = 0, imgOffsetY = 0, imgScale = 1.0, dimOpacity = 0, imgRotation = 0,
                                  cleanOnly = false) {  // cleanOnly: 딤·템플릿·타이포 레이어 스킵 (클린 프레임 전용)
      const ctx = canvas.getContext('2d');
      const W = canvas.width;            // 동적: 16:9→1920, 9:16→1080
      const H = canvas.height;           // 동적: 16:9→1080, 9:16→1920
      const sX = W / 1920;               // 가로 스케일 (9:16: 0.5625)
      const sY = H / 1080;               // 세로 스케일 (9:16: 1.7778)
      const is16x9 = (W === 1920 && H === 1080);  // 템플릿 PNG 사용 여부
      const tplDir = `file://${appDir}/template`;

      // 상태 초기화
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1.0;

      // 1) 검정 배경
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      // 2) 베이스 프레임 이미지 (캐시 없이 직접 로드 → data URL 신뢰성 확보)
      const dataUrl = frame.dataUrl || frame.base64;
      if (dataUrl) {
        const baseImg = await loadImgDirect(
          dataUrl.startsWith('data:') ? dataUrl : `data:image/jpeg;base64,${dataUrl}`
        );
        if (baseImg && baseImg.width > 0) {
          const coverScale = Math.max(W / baseImg.width, H / baseImg.height);
          const finalScale = coverScale * imgScale;
          const sw = baseImg.width * finalScale, sh = baseImg.height * finalScale;
          const cx = W / 2 + imgOffsetX;
          const cy = H / 2 + imgOffsetY;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(imgRotation * Math.PI / 180);
          ctx.drawImage(baseImg, -sw / 2, -sh / 2, sw, sh);
          ctx.restore();
        }
      }

      // 3) 딤 오버레이: 베이스 이미지 위, 템플릿 PNG 아래 (하단 그라디언트) — cleanOnly 시 스킵
      if (!cleanOnly && dimOpacity > 0) {
        const grad = ctx.createLinearGradient(0, H * 0.35, 0, H);
        grad.addColorStop(0, `rgba(0,0,0,0)`);
        grad.addColorStop(1, `rgba(0,0,0,${dimOpacity})`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, H * 0.35, W, H * 0.65);
      }

      // 4) 템플릿 오버레이 (딤 위, 타이포 아래) — 16:9 전용 / cleanOnly 시 스킵
      if (!cleanOnly && is16x9) {
        if (template === 'trailer') {
          const trailerImg = await loadImg(`${tplDir}/YT_Thumbnail_Trailer_16x9_EN.png`);
          if (trailerImg) ctx.drawImage(trailerImg, 0, 0, W, H);
        }
        // Basic 템플릿만: PNG 오버레이 (source-over 직접 합성)
        if (template === 'basic') {
          const basicImg = await loadImg(`${tplDir}/YT_Thumbnail_Basic_16x9_EN.png`);
          if (basicImg) ctx.drawImage(basicImg, 0, 0, W, H);
        }
      }

      // 4) 텍스처 로딩
      const textureImg      = await loadImg(`${tplDir}/Texture - LOCKED.png`);            // (미사용 예비)
      const basicTextureImg = await loadImg(`${tplDir}/Texture-LOCKED_basic.png`);        // ClipMask용 (기본형)
      const burnTextureImg  = await loadImg(`${tplDir}/Texture-LOCKED_LinearBurn.png`);   // ClipMask용 (트레일러)

      // 5) 타이포그래피 — cleanOnly 시 스킵
      if (cleanOnly) { ctx.restore(); return; }
      ctx.textBaseline = 'alphabetic';
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1.0;

      const FONT_TX = 'PUBGTextured, Impact, sans-serif';

      if (is16x9) {
        // ── 16:9 기존 좌표 그대로 ────────────────────────────────────────────
        if (template === 'basic') {
          if (subCopy)  drawClipMaskText(ctx, subCopy,  FONT_TX,  97, '#FFFFFF', 78, 742,  basicTextureImg, -2);
          if (mainCopy) drawClipMaskText(ctx, mainCopy, FONT_TX, 288, '#FFFFFF', 67, 1000, basicTextureImg, -2);
        } else {
          if (subCopy) {
            ctx.font = `95px ${FONT_TX}`;
            setLS(ctx, -2);
            const textW = ctx.measureText(subCopy).width;
            setLS(ctx, 0);
            const PAD_X = 28, BOX_H = 105;
            const BOX_W = Math.ceil(textW) + PAD_X * 2 - 20;
            const BOX_X = 80, BOX_Y = 686;
            drawClipMaskRect(ctx, BOX_X, BOX_Y, BOX_W, BOX_H, '#ffb60e', burnTextureImg);
            ctx.font = `95px ${FONT_TX}`; ctx.fillStyle = '#000000'; ctx.textBaseline = 'middle';
            setLS(ctx, -2);
            ctx.fillText(subCopy, BOX_X + PAD_X - 10, BOX_Y + BOX_H / 2 + 12);
            setLS(ctx, 0); ctx.textBaseline = 'alphabetic';
          }
          if (mainCopy) drawClipMaskText(ctx, mainCopy, FONT_TX, 240, '#ffb60e', 68, 1000, burnTextureImg, -2);
        }

      } else {
        // ── 9:16 전용: 16:9 베이스라인 간격을 sX로 환산해 동일한 행간 유지 ─────
        // 16:9 기준값: sub(742) → main(1000) 간격 = 258px  /  trailer 박스중심(738) → main(1000) = 262px
        // 9:16 환산: 258 * sX ≈ 145px  /  262 * sX ≈ 147px
        if (template === 'basic') {
          const mainFs  = Math.round(288 * sX);             // ~162px
          const subFs   = Math.round(97  * sX);             // ~55px
          const mainY   = H - 130;                          // 하단 130px 위 기준선 ≈ 1790
          const subY    = mainY - Math.round(258 * sX);     // 16:9 행간 비례 ≈ 1645
          const leftX   = Math.round(67 * sX);              // ≈ 38px

          if (subCopy)  drawClipMaskText(ctx, subCopy,  FONT_TX, subFs,  '#FFFFFF', leftX, subY,  basicTextureImg, -2);
          if (mainCopy) drawClipMaskText(ctx, mainCopy, FONT_TX, mainFs, '#FFFFFF', leftX, mainY, basicTextureImg, -2);

        } else {
          // 트레일러 9:16
          const trMainFs = Math.round(240 * sX);            // ~135px
          const trSubFs  = Math.round(95  * sX);            // ~53px
          const BOX_H    = Math.round(105 * sX);            // ≈ 59px
          const trMainY  = H - 130;                         // ≈ 1790
          const BOX_X    = Math.round(80  * sX);            // ≈ 45px
          // 16:9 sub박스 중심(686+52=738) → main(1000) = 262px → 9:16 환산 ≈ 147px
          const subCenterY = trMainY - Math.round(262 * sX); // ≈ 1643
          const BOX_Y    = subCenterY - Math.round(BOX_H / 2); // 박스 상단 ≈ 1614
          const PAD_X    = Math.round(28  * sX);            // ≈ 16px

          if (subCopy) {
            ctx.font = `${trSubFs}px ${FONT_TX}`;
            setLS(ctx, -2);
            const textW = ctx.measureText(subCopy).width;
            setLS(ctx, 0);
            const BOX_W = Math.ceil(textW) + PAD_X * 2 - Math.round(20 * sX);
            drawClipMaskRect(ctx, BOX_X, BOX_Y, BOX_W, BOX_H, '#ffb60e', burnTextureImg);
            ctx.font = `${trSubFs}px ${FONT_TX}`; ctx.fillStyle = '#000000'; ctx.textBaseline = 'middle';
            setLS(ctx, -2);
            ctx.fillText(subCopy, BOX_X + PAD_X - Math.round(10 * sX), subCenterY + Math.round(6 * sX));
            setLS(ctx, 0); ctx.textBaseline = 'alphabetic';
          }
          if (mainCopy) drawClipMaskText(ctx, mainCopy, FONT_TX, trMainFs, '#ffb60e', Math.round(68 * sX), trMainY, burnTextureImg, -2);
        }
      }

      ctx.restore();
    }

    // ─── ThumbnailEditor 컴포넌트 ────────────────────────────────────────────
    function ThumbnailEditor({ frame, appDir, geminiApiKey, onClose }) {
      const [template, setTemplate] = useState('basic');
      const [subCopy, setSubCopy] = useState('PUBG : BATTLEGROUNDS');
      const [mainCopy, setMainCopy] = useState('2025 ROADMAP');
      const [fontsLoaded, setFontsLoaded] = useState(false);
      const [exporting, setExporting] = useState(false);
      // 이미지 위치/크기/회전 조정
      const [imgOffsetX, setImgOffsetX] = useState(0);
      const [imgOffsetY, setImgOffsetY] = useState(0);
      const [imgScale, setImgScale] = useState(1.0);
      const [imgRotation, setImgRotation] = useState(0);
      // 딤 오버레이
      const [dimOpacity, setDimOpacity] = useState(0);
      // 출력 비율: '16:9' (1920×1080) | '9:16' (1080×1920)
      const [aspectRatio, setAspectRatio] = useState('16:9');
      const canvasW   = aspectRatio === '9:16' ? 1080 : 1920;
      const canvasH   = aspectRatio === '9:16' ? 1920 : 1080;
      const maxOffX   = aspectRatio === '9:16' ?  540 :  960;  // 캔버스 반폭
      const maxOffY   = aspectRatio === '9:16' ?  960 :  540;  // 캔버스 반높이
      const canvasRef = useRef(null);
      const imgCacheRef = useRef({});

      // 이미지 로딩 (캐시 적용)
      const loadImg = useCallback((src) => {
        if (imgCacheRef.current[src]) return Promise.resolve(imgCacheRef.current[src]);
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => { imgCacheRef.current[src] = img; resolve(img); };
          img.onerror = () => { console.warn('이미지 로드 실패:', src); resolve(null); };
          img.src = src;
        });
      }, []);

      // 폰트 로딩 (마운트 시 1회)
      useEffect(() => {
        if (!appDir) return;
        (async () => {
          try {
            const fT = new FontFace('PUBGTextured', `url("file://${appDir}/template/PUBG_Battlegrounds_Textured.otf")`);
            const fR = new FontFace('PUBGRegular', `url("file://${appDir}/template/PUBG_Battlegrounds_Regular.otf")`);
            const [loadedT, loadedR] = await Promise.all([fT.load(), fR.load()]);
            document.fonts.add(loadedT);
            document.fonts.add(loadedR);
          } catch (e) {
            console.warn('폰트 로드 실패 (폴백 사용):', e.message);
          } finally {
            setFontsLoaded(true);
          }
        })();
      }, [appDir]);

      // 스마트 크롭 상태
      const [smartCropping, setSmartCropping]     = useState(false);
      const [smartCropResult, setSmartCropResult] = useState(null);
      // 베리에이션 모드 — 1080×1080 정방형 크롭용 피사체 위치
      const [varSubjectX, setVarSubjectX] = useState(0.5);
      const [varSubjectY, setVarSubjectY] = useState(0.5);

      // 비율 변경 시 이미지 조정값 + 스마트 크롭 결과 초기화
      useEffect(() => {
        setImgOffsetX(0); setImgOffsetY(0); setImgScale(1.0); setImgRotation(0);
        setSmartCropResult(null);
        setVarSubjectX(0.5); setVarSubjectY(0.5);
      }, [aspectRatio]);

      // ── Gemini 스마트 크롭: 피사체 수평 위치 감지 → imgOffsetX 자동 계산 ──────
      const handleSmartCrop = async () => {
        if (!geminiApiKey || !frame) return;
        setSmartCropping(true);
        setSmartCropResult(null);
        try {
          // 1) 프레임 base64 추출
          const rawUrl  = frame.dataUrl || frame.base64;
          const dataUrl = rawUrl.startsWith('data:') ? rawUrl : `data:image/jpeg;base64,${rawUrl}`;
          const base64  = dataUrl.split(',')[1];

          // 2~3) 피사체 위치 — 데모 모드면 합성값, 아니면 Gemini 호출 후 파싱
          let subjectX, subjectY;
          if (isMockKey(geminiApiKey)) {
            await delay(150);
            subjectX = Math.max(0, Math.min(1, 0.4 + seededUnit(base64.slice(0, 80) + '|sx') * 0.2));
            subjectY = Math.max(0, Math.min(1, 0.35 + seededUnit(base64.slice(0, 80) + '|sy') * 0.2));
          } else {
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`;
            const prompt = `이 게임 스크린샷에서 가장 중요한 피사체(캐릭터, 플레이어, 핵심 액션 포인트)를 찾아 위치를 반환하세요.
0.0 = 왼쪽/상단 끝, 1.0 = 오른쪽/하단 끝.
반드시 JSON만 응답하세요: {"subject_x": 0.45, "subject_y": 0.40}`;
            const body = JSON.stringify({
              contents: [{ parts: [
                { inline_data: { mime_type: 'image/jpeg', data: base64 } },
                { text: prompt }
              ]}],
            });
            const response = await fetchWithGeminiRetry(apiUrl, body);
            const data     = await response.json();
            const text     = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

            const jsonMatch = text.match(/\{[\s\S]*?\}/);
            if (!jsonMatch) throw new Error('Gemini 응답에서 JSON을 찾을 수 없습니다');
            const parsed   = JSON.parse(jsonMatch[0]);
            subjectX = Math.max(0, Math.min(1, parsed.subject_x ?? 0.5));
            subjectY = Math.max(0, Math.min(1, parsed.subject_y ?? 0.5));
          }

          // 4) 이미지 실제 크기 로드
          const img = await loadImgDirect(dataUrl);
          if (!img || img.width === 0) throw new Error('이미지 크기 확인 실패');

          // 5) imgOffsetX 계산 — 1080×1920 프리뷰: 피사체를 가로 중앙에 배치
          const coverScale    = Math.max(canvasW / img.width, canvasH / img.height);
          const rawOffset     = Math.round(coverScale * img.width * (0.5 - subjectX));
          const clampedOffset = Math.max(-maxOffX, Math.min(maxOffX, rawOffset));
          setImgOffsetX(clampedOffset);

          // 6) varSubjectX/Y 저장 — 1080×1080 정방형 크롭에서 사용
          setVarSubjectX(subjectX);
          setVarSubjectY(subjectY);

          // 7) 결과 레이블
          const posLabelX = subjectX < 0.35 ? '좌측' : subjectX > 0.65 ? '우측' : '중앙';
          const posLabelY = subjectY < 0.35 ? '상단' : subjectY > 0.65 ? '하단' : '중앙';
          setSmartCropResult(`🎯 X ${posLabelX} ${Math.round(subjectX*100)}% · Y ${posLabelY} ${Math.round(subjectY*100)}% — 세로+정방형 크롭 준비됨`);

        } catch (e) {
          setSmartCropResult(`⚠️ 감지 실패: ${e.message}`);
        } finally {
          setSmartCropping(false);
        }
      };

      // 베리에이션 내보내기 — 1080×1920 클린 + 1080×1080 캐릭터 중심 크롭 동시 저장
      const handleVariationExport = async () => {
        if (!frame) return;
        setExporting(true);
        try {
          const baseName = `variation_${Date.now()}`;

          // ① 1080×1920 클린 (현재 슬라이더 조정값 그대로, 텍스트·딤·템플릿 없음)
          const off1920 = document.createElement('canvas');
          off1920.width = 1080; off1920.height = 1920;
          await drawThumbnail(off1920, frame, appDir, template, '', '', loadImg,
                              imgOffsetX, imgOffsetY, imgScale, 0, imgRotation, true);
          const url1920 = off1920.toDataURL('image/png');

          // ② 1080×1080 캐릭터 중심 크롭 클린
          const off1080 = document.createElement('canvas');
          off1080.width = 1080; off1080.height = 1080;
          const rawUrl  = frame.dataUrl || frame.base64;
          const dataUrl = rawUrl.startsWith('data:') ? rawUrl : `data:image/jpeg;base64,${rawUrl}`;
          const srcImg  = await loadImgDirect(dataUrl);
          let sqOffX = 0, sqOffY = 0;
          if (srcImg && srcImg.width > 0) {
            const cs = Math.max(1080 / srcImg.width, 1080 / srcImg.height);
            sqOffX = Math.max(-540, Math.min(540, Math.round(cs * srcImg.width  * (0.5 - varSubjectX))));
            sqOffY = Math.max(-540, Math.min(540, Math.round(cs * srcImg.height * (0.5 - varSubjectY))));
          }
          await drawThumbnail(off1080, frame, appDir, template, '', '', loadImg,
                              sqOffX, sqOffY, 1.0, 0, 0, true);
          const url1080 = off1080.toDataURL('image/png');

          // ③ 다이얼로그 1회 → _1920 / _1080 두 파일 저장
          if (isElectron) {
            const filePath = await eAPI.saveImageDialog(`${baseName}.png`);
            if (filePath) {
              const base = filePath.replace(/\.png$/i, '');
              await eAPI.saveImageFile(`${base}_1920.png`, url1920);
              await eAPI.saveImageFile(`${base}_1080.png`, url1080);
            }
          } else {
            const dl = (u, n) => { const a = document.createElement('a'); a.download = n; a.href = u; a.click(); };
            dl(url1920, `${baseName}_1920.png`);
            await new Promise(r => setTimeout(r, 300));
            dl(url1080, `${baseName}_1080.png`);
          }
        } finally { setExporting(false); }
      };

      // 캔버스 재그리기: 입력값 변경 시 200ms debounce
      // 베리에이션(9:16) 모드에서는 cleanOnly=true — 텍스트·딤 없는 클린 프리뷰
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !frame || !appDir) return;
        let cancelled = false;
        const isVar = (aspectRatio === '9:16');
        const timer = setTimeout(async () => {
          if (cancelled) return;
          await drawThumbnail(canvas, frame, appDir, template, subCopy, mainCopy, loadImg,
                              imgOffsetX, imgOffsetY, imgScale,
                              isVar ? 0 : dimOpacity,
                              imgRotation,
                              isVar);
        }, 200);
        return () => { cancelled = true; clearTimeout(timer); };
      }, [frame, appDir, template, subCopy, mainCopy, fontsLoaded, loadImg,
          imgOffsetX, imgOffsetY, imgScale, dimOpacity, imgRotation, aspectRatio]);

      // PNG 내보내기 — 두 버전 동시 저장
      // 저장 다이얼로그 1회 → 경로 기반으로 _full / _clean 두 파일 자동 생성
      const handleExport = async () => {
        if (!canvasRef.current) return;
        setExporting(true);
        try {
          const ratioTag = aspectRatio.replace(':', 'x');
          const baseName = `thumbnail_${ratioTag}_${Date.now()}`;

          // 풀 버전 렌더링 (현재 캔버스)
          await drawThumbnail(canvasRef.current, frame, appDir, template, subCopy, mainCopy, loadImg,
                              imgOffsetX, imgOffsetY, imgScale, dimOpacity, imgRotation);
          const fullDataUrl = canvasRef.current.toDataURL('image/png');

          // 클린 버전 렌더링 (오프스크린 — 미리보기 캔버스 유지)
          const offscreen = document.createElement('canvas');
          offscreen.width = canvasW; offscreen.height = canvasH;
          await drawThumbnail(offscreen, frame, appDir, template, subCopy, mainCopy, loadImg,
                              imgOffsetX, imgOffsetY, imgScale, 0, imgRotation, true);
          const cleanDataUrl = offscreen.toDataURL('image/png');

          if (isElectron) {
            // 다이얼로그 1회: 사용자가 선택한 경로에서 확장자 제거 후 _full / _clean 붙이기
            const filePath = await eAPI.saveImageDialog(`${baseName}.png`);
            if (filePath) {
              const base = filePath.replace(/\.png$/i, '');
              await eAPI.saveImageFile(`${base}_full.png`, fullDataUrl);
              await eAPI.saveImageFile(`${base}_clean.png`, cleanDataUrl);
            }
          } else {
            // 웹: 두 파일 순차 다운로드
            const dl = (dataUrl, name) => {
              const a = document.createElement('a');
              a.download = name; a.href = dataUrl; a.click();
            };
            dl(fullDataUrl,  `${baseName}_full.png`);
            await new Promise(r => setTimeout(r, 300));
            dl(cleanDataUrl, `${baseName}_clean.png`);
          }
        } finally { setExporting(false); }
      };

      return (
        <div className="fixed inset-0 bg-black flex z-[60]">
          {/* ── 캔버스 미리보기 ─────────────────────────────────────────── */}
          <div className="flex-1 flex items-center justify-center bg-black overflow-hidden p-3">
            <canvas
              ref={canvasRef}
              width={canvasW}
              height={canvasH}
              style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain',
                       aspectRatio: aspectRatio === '9:16' ? '9/16' : '16/9' }}
              className="rounded-none shadow-2xl"
            />
          </div>

          {/* ── 컨트롤 패널 ─────────────────────────────────────────────── */}
          <div className="w-80 bg-slate-900 flex flex-col text-white" style={{ minWidth: '320px' }}>
            {/* 헤더 */}
            <div className="px-5 py-4 border-b border-slate-700 flex items-center justify-between flex-shrink-0">
              <div>
                <h2 className="font-bold text-base">🎨 썸네일 편집</h2>
                {frame.timestamp !== undefined && (
                  <p className="text-xs text-slate-400 mt-0.5">타임스탬프: {frame.timestamp.toFixed(2)}s</p>
                )}
              </div>
              <button
                onClick={onClose}
                className="w-8 h-8 rounded-none flex items-center justify-center text-slate-400 hover:bg-slate-700 hover:text-white transition text-xl leading-none"
              >×</button>
            </div>

            <div className="p-5 space-y-5 flex-1 overflow-y-auto">
              {/* 출력 비율 */}
              <div>
                <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">출력 비율</p>
                <div className="grid grid-cols-2 gap-2">
                  {[['16:9', '16:9  가로형'], ['9:16', '베리에이션']].map(([key, label]) => (
                    <button
                      key={key}
                      onClick={() => setAspectRatio(key)}
                      className={`py-2.5 rounded-none text-sm font-semibold transition-colors ${
                        aspectRatio === key
                          ? (key === '9:16' ? 'bg-[#f9423a] text-white' : 'bg-black text-white')
                          : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                      }`}
                    >{label}</button>
                  ))}
                </div>
                {aspectRatio === '9:16' && (
                  <p className="text-xs text-red-400 mt-1.5">
                    클린 이미지 전용 · 텍스트·딤·템플릿 없음 · 세로(1920) + 정방형(1080) 동시 저장
                  </p>
                )}
              </div>

              {/* 템플릿 · 카피 · 딤 — 16:9 가로형 전용 */}
              {aspectRatio === '16:9' && (
                <React.Fragment>
                  {/* 템플릿 선택 */}
                  <div>
                    <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">템플릿</p>
                    <div className="grid grid-cols-2 gap-2">
                      {[['basic', '기본형'], ['trailer', '트레일러']].map(([key, label]) => (
                        <button
                          key={key}
                          className={`py-2.5 rounded-none text-sm font-semibold transition-colors ${template === key ? 'bg-[#f9423a] text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                          onClick={() => setTemplate(key)}
                        >{label}</button>
                      ))}
                    </div>
                  </div>

                  {/* 서브 카피 */}
                  <div>
                    <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-2">
                      서브 카피
                      <span className="normal-case font-normal text-slate-500 ml-1">
                        {template === 'basic' ? '— Textured 70px · Multiply 45%' : '— Textured 70px · #000 · LinearBurn'}
                      </span>
                    </label>
                    <input
                      type="text"
                      value={subCopy}
                      onChange={(e) => setSubCopy(e.target.value)}
                      className="w-full bg-slate-800 border border-slate-600 rounded-none px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-[#f9423a] transition"
                      placeholder="예: PUBG : BATTLEGROUNDS"
                    />
                    <p className="text-xs text-slate-500 mt-1">
                      {template === 'trailer'
                        ? <React.Fragment><span style={{color:'#ffb60e'}}>■</span> 우측 80px · 상단 690px · 높이 80px 박스</React.Fragment>
                        : '흰색 · x=115, y=805'}
                    </p>
                  </div>

                  {/* 메인 카피 */}
                  <div>
                    <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-2">
                      메인 카피
                      <span className="normal-case font-normal text-slate-500 ml-1">
                        {template === 'basic' ? '— Textured 200px · Multiply 45%' : '— Textured 165px · #ffb60e · LinearBurn'}
                      </span>
                    </label>
                    <input
                      type="text"
                      value={mainCopy}
                      onChange={(e) => setMainCopy(e.target.value)}
                      className="w-full bg-slate-800 border border-slate-600 rounded-none px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-[#f9423a] transition"
                      placeholder="예: 2025 ROADMAP"
                    />
                    <p className="text-xs text-slate-500 mt-1">
                      {template === 'trailer'
                        ? <React.Fragment><span style={{color:'#ffb60e'}}>■</span> x=100, y=990</React.Fragment>
                        : '흰색 · x=115, y=1010'}
                    </p>
                  </div>

                  {/* 딤 오버레이 */}
                  <div>
                    <div className="flex items-center justify-between mb-2">
                      <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">딤 효과</p>
                      <button
                        onClick={() => setDimOpacity(0)}
                        className="text-xs text-slate-500 hover:text-slate-300 transition"
                      >초기화</button>
                    </div>
                    <div>
                      <div className="flex justify-between text-xs text-slate-400 mb-1">
                        <span>불투명도</span>
                        <span className="font-mono">{Math.round(dimOpacity * 100)}%</span>
                      </div>
                      <input type="range" min="0" max="1" step="0.01"
                        value={dimOpacity}
                        onChange={(e) => setDimOpacity(parseFloat(e.target.value))}
                        className="w-full accent-[#f9423a]"
                      />
                      <p className="text-xs text-slate-600 mt-1">하단 그라디언트 · 텍스트 가독성 향상</p>
                    </div>
                  </div>
                </React.Fragment>
              )}

              {/* 이미지 위치/크기 조정 */}
              <div>
                <div className="flex items-center justify-between mb-2">
                  <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">이미지 조정</p>
                  <div className="flex items-center gap-3">
                    {/* 스마트 크롭 버튼 — 베리에이션(9:16) 전용 */}
                    {aspectRatio === '9:16' && (
                      <button
                        onClick={handleSmartCrop}
                        disabled={smartCropping || !geminiApiKey}
                        title={!geminiApiKey ? 'Gemini API 키가 필요합니다' : 'Gemini로 피사체 XY 위치 감지 → 세로+정방형 자동 크롭'}
                        className="flex items-center gap-1 text-xs font-semibold text-red-400 hover:text-red-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
                      >
                        {smartCropping
                          ? <><icons.Loader2 className="w-3 h-3" /> 분석 중...</>
                          : '🎯 스마트 크롭'}
                      </button>
                    )}
                    <button
                      onClick={() => { setImgOffsetX(0); setImgOffsetY(0); setImgScale(1.0); setImgRotation(0); }}
                      className="text-xs text-slate-500 hover:text-slate-300 transition"
                    >초기화</button>
                  </div>
                </div>
                {/* 스마트 크롭 결과 메시지 */}
                {smartCropResult && aspectRatio === '9:16' && (
                  <p className={`text-xs mb-2 ${smartCropResult.startsWith('⚠️') ? 'text-amber-400' : 'text-red-400'}`}>
                    {smartCropResult}
                  </p>
                )}
                <div className="space-y-3">
                  {/* 스케일 */}
                  <div>
                    <div className="flex justify-between text-xs text-slate-400 mb-1">
                      <span>크기</span>
                      <span className="font-mono">{imgScale.toFixed(2)}×</span>
                    </div>
                    <input type="range" min="0.5" max="2.0" step="0.01"
                      value={imgScale}
                      onChange={(e) => setImgScale(parseFloat(e.target.value))}
                      className="w-full accent-[#f9423a]"
                    />
                  </div>
                  {/* X 오프셋 */}
                  <div>
                    <div className="flex justify-between text-xs text-slate-400 mb-1">
                      <span>X 위치</span>
                      <span className="font-mono">{imgOffsetX > 0 ? '+' : ''}{imgOffsetX}px</span>
                    </div>
                    <input type="range" min={-maxOffX} max={maxOffX} step="1"
                      value={imgOffsetX}
                      onChange={(e) => setImgOffsetX(parseInt(e.target.value))}
                      className="w-full accent-[#f9423a]"
                    />
                  </div>
                  {/* Y 오프셋 */}
                  <div>
                    <div className="flex justify-between text-xs text-slate-400 mb-1">
                      <span>Y 위치</span>
                      <span className="font-mono">{imgOffsetY > 0 ? '+' : ''}{imgOffsetY}px</span>
                    </div>
                    <input type="range" min={-maxOffY} max={maxOffY} step="1"
                      value={imgOffsetY}
                      onChange={(e) => setImgOffsetY(parseInt(e.target.value))}
                      className="w-full accent-[#f9423a]"
                    />
                  </div>
                  {/* 회전 */}
                  <div>
                    <div className="flex justify-between text-xs text-slate-400 mb-1">
                      <span>회전</span>
                      <span className="font-mono">{imgRotation > 0 ? '+' : ''}{imgRotation}°</span>
                    </div>
                    <input type="range" min="-180" max="180" step="0.5"
                      value={imgRotation}
                      onChange={(e) => setImgRotation(parseFloat(e.target.value))}
                      className="w-full accent-[#f9423a]"
                    />
                  </div>
                </div>
              </div>

              {/* 렌더링 상태 */}
              {!fontsLoaded && (
                <div className="bg-slate-800 rounded-none p-3 text-xs text-slate-400 flex items-center gap-2">
                  <icons.Loader2 className="w-3 h-3" />
                  PUBG 폰트 로딩 중...
                </div>
              )}

              {/* 레이아웃 안내 — 16:9 전용 */}
              {aspectRatio === '16:9' && (
                <div className="bg-slate-800 rounded-none p-3 text-xs text-slate-500 space-y-1">
                  <p className="font-semibold text-slate-400">레이아웃 정보
                    <span className="ml-2 font-normal text-slate-500">1920×1080px</span>
                  </p>
                  {template === 'basic' ? (
                    <React.Fragment>
                      <p>• 서브: Textured 97px · #FFF · ClipMask</p>
                      <p>• 메인: Textured 288px · #FFF · ClipMask</p>
                      <p>• Basic PNG 오버레이 적용</p>
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <p>• Trailer PNG 오버레이 적용</p>
                      <p>• 서브 박스: x=80, y=686, h=105 · #ffb60e</p>
                      <p>• 서브 텍스트: Textured 95px · #000</p>
                      <p>• 메인: Textured 240px · #ffb60e · ClipMask</p>
                    </React.Fragment>
                  )}
                </div>
              )}

              {/* 1080 정방형 크롭 정보 — 베리에이션 전용 */}
              {aspectRatio === '9:16' && (
                <div className="bg-slate-800 rounded-none p-3 text-xs space-y-1.5">
                  <p className="font-semibold text-slate-300">📐 정방형 크롭 정보 (1080×1080)</p>
                  <div className="flex gap-4 text-slate-400">
                    <span>피사체 X: <span className="font-mono text-slate-200">{Math.round(varSubjectX * 100)}%</span></span>
                    <span>Y: <span className="font-mono text-slate-200">{Math.round(varSubjectY * 100)}%</span></span>
                  </div>

                    경로 선택 1회 → <span className="text-slate-400">_full</span> · <span className="text-slate-400">_clean</span> 2개 파일 자동 생성

    // ─── ImageVariation ─────────────────────────────────────────────────────
    function ImageVariation() {
      const [srcImg, setSrcImg]         = useState(null);
      const [srcDataUrl, setSrcDataUrl] = useState(null);
      const [draggingOver, setDraggingOver] = useState(false);

      // 정방형 1080×1080 오프셋
      const [sqOffX, setSqOffX] = useState(0);
      const [sqOffY, setSqOffY] = useState(0);
      // 세로형 1080×1920 오프셋
      const [vtOffX, setVtOffX] = useState(0);
      const [vtOffY, setVtOffY] = useState(0);

      const [exporting, setExporting]   = useState(false);
      const [exportMsg, setExportMsg]   = useState('');

      const sqCanvasRef  = useRef(null);
      const vtCanvasRef  = useRef(null);
      const fileInputRef = useRef(null);

      // Cover 방식으로 canvas에 그리기 (preview·export 공용)
      const drawVariation = useCallback((canvas, targetW, targetH, offX, offY, img) => {
        if (!img) return;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const scale = Math.max(targetW / img.naturalWidth, targetH / img.naturalHeight);
        const ds    = canvas.width / targetW;           // preview 축소 비율
        const sw    = img.naturalWidth  * scale * ds;
        const sh    = img.naturalHeight * scale * ds;
        const bx    = (canvas.width  - sw) / 2 + offX * ds;
        const by    = (canvas.height - sh) / 2 + offY * ds;
        ctx.drawImage(img, bx, by, sw, sh);
      }, []);

      // 슬라이더 최대 범위 계산
      const getMaxOffset = useCallback((targetW, targetH) => {
        if (!srcImg) return { x: 0, y: 0 };
        const scale = Math.max(targetW / srcImg.naturalWidth, targetH / srcImg.naturalHeight);
        return {
          x: Math.max(0, Math.round((srcImg.naturalWidth  * scale - targetW)  / 2)),
          y: Math.max(0, Math.round((srcImg.naturalHeight * scale - targetH) / 2)),
        };
      }, [srcImg]);

      // 이미지 변경 또는 오프셋 변경 시 미리보기 재렌더
      useEffect(() => {
        if (!srcImg) return;
        if (sqCanvasRef.current) drawVariation(sqCanvasRef.current, 1080, 1080, sqOffX, sqOffY, srcImg);
        if (vtCanvasRef.current) drawVariation(vtCanvasRef.current, 1080, 1920, vtOffX, vtOffY, srcImg);
      }, [srcImg, sqOffX, sqOffY, vtOffX, vtOffY, drawVariation]);

      const loadFile = (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            setSrcImg(img);
            setSrcDataUrl(e.target.result);
            setSqOffX(0); setSqOffY(0);
            setVtOffX(0); setVtOffY(0);
            setExportMsg('');
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setDraggingOver(false);
        loadFile(e.dataTransfer.files[0]);
      };

      const handleExport = async () => {
        if (!srcImg) return;
        setExporting(true);
        setExportMsg('');
        try {
          const sqC = document.createElement('canvas');
          sqC.width = 1080; sqC.height = 1080;
          drawVariation(sqC, 1080, 1080, sqOffX, sqOffY, srcImg);

          const vtC = document.createElement('canvas');
          vtC.width = 1080; vtC.height = 1920;
          drawVariation(vtC, 1080, 1920, vtOffX, vtOffY, srcImg);

          if (isElectron) {
            const filePath = await eAPI.saveImageDialog('variation.png');
            if (filePath) {
              const base = filePath.replace(/\.png$/i, '');
              await eAPI.saveImageFile(`${base}_1080x1080.png`, sqC.toDataURL('image/png'));
              await eAPI.saveImageFile(`${base}_1080x1920.png`, vtC.toDataURL('image/png'));
              setExportMsg('✅ 저장 완료!');
            }
          } else {
            const dl = (url, name) => { const a = document.createElement('a'); a.href = url; a.download = name; a.click(); };
            dl(sqC.toDataURL('image/png'), 'variation_1080x1080.png');
            await new Promise(r => setTimeout(r, 300));
            dl(vtC.toDataURL('image/png'), 'variation_1080x1920.png');
            setExportMsg('✅ 다운로드 완료!');
          }
        } catch (err) {
          setExportMsg(`⚠️ 오류: ${err.message}`);
        } finally {
          setExporting(false);
        }
      };

      const sqMax = getMaxOffset(1080, 1080);
      const vtMax = getMaxOffset(1080, 1920);

      return (
        <div className="space-y-6">

          {/* ── 이미지 업로드 영역 ── */}
          <div
            onDragOver={(e) => { e.preventDefault(); setDraggingOver(true); }}
            onDragLeave={() => setDraggingOver(false)}
            onDrop={handleDrop}
            onClick={() => fileInputRef.current?.click()}
            className={`border-2 border-dashed rounded-none p-10 text-center cursor-pointer transition-colors select-none ${
              draggingOver
                ? 'border-[#f9423a] bg-red-50'
                : 'border-slate-300 hover:border-red-400 hover:bg-slate-50'
            }`}
          >
            <input
              ref={fileInputRef} type="file" accept="image/*" className="hidden"
              onChange={(e) => loadFile(e.target.files[0])}
            />
            {srcDataUrl ? (
              <div className="flex items-center justify-center gap-4">
                <img src={srcDataUrl} className="h-20 w-20 object-cover rounded-none shadow" alt="원본" />
                <div className="text-left">
                  <p className="font-semibold text-slate-700">이미지 업로드됨</p>
                  <p className="text-sm text-slate-500">{srcImg?.naturalWidth} × {srcImg?.naturalHeight} px</p>
                  <p className="text-xs text-[#f9423a] mt-1">클릭하면 다른 이미지로 교체</p>
                </div>
              </div>
            ) : (
              <div>
                <div className="text-5xl mb-3">🖼️</div>
                <p className="text-slate-600 font-medium">이미지를 드래그하거나 클릭해서 업로드</p>
                <p className="text-slate-400 text-sm mt-1">PNG · JPG · WEBP 등 지원</p>
              </div>
            )}
          </div>

          {/* ── 미리보기 + 슬라이더 ── */}
          {srcImg && (
            <div className="grid grid-cols-2 gap-6">

              {/* 정방형 1080×1080 */}
              <div className="bg-white rounded-none border border-slate-200 p-5 space-y-4">
                <div className="flex items-center justify-between">
                  <h3 className="font-semibold text-slate-800">정방형</h3>
                  <span className="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-none font-mono">1080 × 1080</span>
                </div>
                <div className="flex justify-center bg-slate-100 rounded-none overflow-hidden">
                  <canvas ref={sqCanvasRef} width={270} height={270} className="block" />
                </div>
                <div className="space-y-3">
                  <div>
                    <div className="flex justify-between text-xs text-slate-500 mb-1">
                      <span className="font-medium">가로 위치</span>
                      <span className="text-[#f9423a] font-mono">{sqOffX}px</span>
                    </div>
                    <input type="range"
                      min={-sqMax.x} max={sqMax.x} value={sqOffX}
                      onChange={(e) => setSqOffX(Number(e.target.value))}
                      disabled={sqMax.x === 0}
                      className="w-full accent-[#f9423a] disabled:opacity-30"
                    />
                  </div>
                  <div>
                    <div className="flex justify-between text-xs text-slate-500 mb-1">
                      <span className="font-medium">세로 위치</span>
                      <span className="text-[#f9423a] font-mono">{sqOffY}px</span>
                    </div>
                    <input type="range"
                      min={-sqMax.y} max={sqMax.y} value={sqOffY}
                      onChange={(e) => setSqOffY(Number(e.target.value))}
                      disabled={sqMax.y === 0}
                      className="w-full accent-[#f9423a] disabled:opacity-30"
                    />
                  </div>
                  <button
                    onClick={() => { setSqOffX(0); setSqOffY(0); }}
                    className="text-xs text-slate-400 hover:text-slate-600 underline"
                  >초기화</button>
                </div>
              </div>

              {/* 세로형 1080×1920 */}
              <div className="bg-white rounded-none border border-slate-200 p-5 space-y-4">
                <div className="flex items-center justify-between">
                  <h3 className="font-semibold text-slate-800">세로형</h3>
                  <span className="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-none font-mono">1080 × 1920</span>
                </div>
                <div className="flex justify-center bg-slate-100 rounded-none overflow-hidden">
                  <canvas ref={vtCanvasRef} width={152} height={270} className="block" />
                </div>
                <div className="space-y-3">
                  <div>
                    <div className="flex justify-between text-xs text-slate-500 mb-1">
                      <span className="font-medium">가로 위치</span>
                      <span className="text-[#f9423a] font-mono">{vtOffX}px</span>
                    </div>
                    <input type="range"
                      min={-vtMax.x} max={vtMax.x} value={vtOffX}
                      onChange={(e) => setVtOffX(Number(e.target.value))}
                      disabled={vtMax.x === 0}
                      className="w-full accent-[#f9423a] disabled:opacity-30"
                    />
                  </div>
                  <div>
                    <div className="flex justify-between text-xs text-slate-500 mb-1">
                      <span className="font-medium">세로 위치</span>
                      <span className="text-[#f9423a] font-mono">{vtOffY}px</span>
                    </div>
                    <input type="range"
                      min={-vtMax.y} max={vtMax.y} value={vtOffY}
                      onChange={(e) => setVtOffY(Number(e.target.value))}
                      disabled={vtMax.y === 0}
                      className="w-full accent-[#f9423a] disabled:opacity-30"
                    />
                  </div>
                  <button
                    onClick={() => { setVtOffX(0); setVtOffY(0); }}
                    className="text-xs text-slate-400 hover:text-slate-600 underline"
                  >초기화</button>
                </div>
              </div>
            </div>
          )}

          {/* ── 저장 버튼 ── */}
          {srcImg && (
            <div className="flex items-center gap-4 pt-2">
              <button
                onClick={handleExport}
                disabled={exporting}
                className="btn btn-primary btn-lg"
              >
                {exporting
                  ? <React.Fragment><icons.Loader2 className="w-4 h-4" /> 저장 중...</React.Fragment>
                  : '📥 베리에이션 저장 (1080×1080 + 1080×1920)'}
              </button>
              {exportMsg && <span className="text-sm text-slate-600">{exportMsg}</span>}
            </div>
          )}

          {/* ── 안내 ── */}
          <p className="text-xs text-slate-400">
            저장 시 파일명 선택 1회 → <span className="font-mono">_1080x1080.png</span> · <span className="font-mono">_1080x1920.png</span> 두 파일이 자동 생성됩니다.
          </p>
        </div>
      );
    }

    // ─── App ────────────────────────────────────────────────────────────────
    // ─── 최초 진입 시 보이는 온보딩(API 키 입력) 화면 ─────────────────────

      };

      // KRAFTON Brand Guidelines V1.1 준수
      //  - Primary Color: Black #000000, Orange #f9423a, White #ffffff

      const KRAFTON_ORANGE = '#f9423a';
      return (
        <div

        >
          {isElectron && <div className="titlebar-drag fixed top-0 left-0 right-0 h-8 z-40" />}

          {/* 상단 브랜드 영역 */}
          <div className={`px-10 pt-${isElectron ? '14' : '10'} pb-4 flex items-center justify-between`} style={{ paddingTop: isElectron ? '3.5rem' : '2.5rem' }}>
            <div className="text-[11px] tracking-[0.25em] font-semibold uppercase" style={{ color: KRAFTON_ORANGE }}>
              GRAPHIC TEAM · DESIGN WORKBENCH
            </div>
            <div className="text-[11px] tracking-[0.25em] font-semibold uppercase text-white/60">
              SETUP · V1
            </div>
          </div>

          {/* 본문: 좌측 정렬, 구조적 레이아웃 */}
          <div className="flex-1 flex items-center px-10">
            <div className="w-full max-w-2xl">
              <div className="space-y-10">
                <div>
                  <div className="text-[13px] tracking-[0.3em] font-semibold uppercase mb-4" style={{ color: KRAFTON_ORANGE }}>
                    01 · API KEY
                  </div>
                  <h1 className="font-headline text-5xl md:text-6xl leading-[0.95] uppercase">
                    시작하기 전에<br />
                    <span style={{ color: KRAFTON_ORANGE }}>API KEY</span>를<br />
                    입력하세요.
                  </h1>
                  <p className="text-sm text-white/60 mt-6 leading-relaxed max-w-md">
                    썸네일 워크벤치는 Google Gemini API를 사용합니다.<br />
                    아래에 Gemini API 키를 입력하면 시작할 수 있습니다.
                  </p>
                </div>

                {/* 입력 영역 */}
                <div className="space-y-3 max-w-xl">
                  <label className="block text-[11px] tracking-[0.2em] font-semibold uppercase text-white/50">
                    GEMINI API KEY
                  </label>
                  <div className="relative">
                    <input
                      type={show ? 'text' : 'password'}
                      value={draft}
                      onChange={(e) => setDraft(e.target.value)}
                      onKeyDown={(e) => { if (e.key === 'Enter' && draft.trim() && !saving) handleSave(); }}
                      placeholder="AIza..."
                      autoFocus
                      className="w-full bg-transparent border-0 border-b-2 border-white/30 px-0 py-3 pr-16 text-base text-white placeholder-white/30 focus:outline-none transition-colors"
                      style={{ caretColor: KRAFTON_ORANGE }}
                      onFocus={(e) => { e.target.style.borderBottomColor = KRAFTON_ORANGE; }}
                      onBlur={(e) => { e.target.style.borderBottomColor = 'rgba(255,255,255,0.3)'; }}
                    />
                    <button
                      type="button"
                      onClick={() => setShow((v) => !v)}
                      className="absolute right-0 top-1/2 -translate-y-1/2 text-[11px] tracking-[0.2em] font-semibold uppercase text-white/50 hover:text-white"
                      tabIndex={-1}
                    >
                      {show ? 'HIDE' : 'SHOW'}
                    </button>
                  </div>
                </div>

                {/* 버튼 영역 */}
                <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 pt-2">
                  <button
                    onClick={handleSave}
                    disabled={!draft.trim() || saving}
                    className="btn btn-primary btn-lg"
                  >
                    {saving ? 'SAVING...' : '저장하고 시작하기 →'}
                  </button>
                  <a
                    href="https://aistudio.google.com/app/apikey"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="btn btn-outline-dark btn-lg"
                  >
                    API 키 발급받기 ↗
                  </a>
                </div>

                {/* 데모(모의) 모드 — API 키 없이 둘러보기 */}

                  type="button"
                  onClick={async () => { await storage.set('geminiApiKey', MOCK_KEY); onSaved(MOCK_KEY); }}

          </div>
        </div>
      );

                  </h1>
                </div>
                {/* 우상단 설정(톱니바퀴) 버튼 */}
                <button
                  type="button"
                  onClick={() => setActiveTab('rules')}
                  title="설정"
                  aria-label="설정"
                  className={`shrink-0 p-2 transition-colors ${
                    activeTab === 'rules'
                      ? 'text-[#f9423a]'
                      : 'text-white/70 hover:text-white'
                  }`}
                >
                  <icons.Settings className="w-6 h-6" />
                </button>
              </div>
            </div>
            {/* 탭 네비게이션 — 검정 바 하단 */}
            <div className="max-w-7xl mx-auto px-8 flex items-center gap-0 border-t border-white/10">
              {tabs.map((tab) => {
                const active = activeTab === tab.id;
                return (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`px-6 py-4 text-[12px] tracking-[0.15em] font-semibold uppercase transition-colors relative ${
                      active ? 'text-white' : 'text-white/50 hover:text-white/80'
                    }`}
                  >
                    {tab.label}
                    {active && (
                      <span className="absolute bottom-0 left-0 right-0 h-[3px]" style={{ backgroundColor: '#f9423a' }} />
                    )}
                  </button>
                );
              })}
            </div>
          </div>

          {/* 본문 영역 */}
          <div className="max-w-7xl mx-auto px-8 py-10">
            {/* 섹션 헤더 */}
            <div className="mb-5 border-b border-black/10 pb-5">
              <div className="text-[10px] tracking-[0.25em] font-semibold uppercase text-black/40 mb-2">
                {activeTab === 'rules' ? '03 · SETTINGS' : activeTab === 'variation' ? '02 · VARIATION' : '01 · FRAMES'}
              </div>
              <h1 className="font-headline text-4xl uppercase leading-none">
                {activeTab === 'rules' ? '설정 · 데이터 & 규칙' : activeTab === 'variation' ? '이미지 베리에이션' : '영상 프레임 추천'}
              </h1>
              <p className="text-sm text-black/60 mt-3 max-w-xl">
                {activeTab === 'rules'
                  ? 'API 키 · CTR 데이터 · 분석 규칙을 한 곳에서 관리합니다.'
                  : isElectron
                    ? 'FFmpeg 고속 추출과 AI 분석으로 최적 썸네일을 선별합니다.'
                    : 'CTR 데이터 분석 → 규칙화 → 영상 프레임 스캐닝까지 한 화면에서.'}
              </p>
            </div>

            {activeTab === 'rules' ? (
              <RulesGenerator geminiApiKey={geminiApiKey} setGeminiApiKey={setGeminiApiKey} rules={rules} setRules={setRules} />
            ) : activeTab === 'variation' ? (
              <ImageVariation />
            ) : (
              <FrameExtractor geminiApiKey={geminiApiKey} setGeminiApiKey={setGeminiApiKey} rules={rules} setRules={setRules} />
            )}
            {activeTab === 'rules' && (
              <div className="mt-10">
                <GeminiDebugPanel logs={debugLogs} onClear={() => setDebugLogs([])} />
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
