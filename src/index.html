<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그래픽팀 디자인 워크벤치</title>
  <!-- Electron에서는 CSP 설정 없이 CDN 로드 가능 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Pretendard 본문 서체 (KRAFTON Brand Guidelines 3.2) -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* macOS 타이틀바 영역 확보 */
    body { -webkit-app-region: no-drag; }
    .titlebar-drag { -webkit-app-region: drag; }
    /* KRAFTON Brand 폰트 적용 (Pretendard) */
    body, .font-brand { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; letter-spacing: -0.01em; }
    /* 헤드라인용 (대문자, 한 단계 얇은 굵기 — KRAFTON Headline 대체) */
    .font-headline { font-family: 'Pretendard', system-ui, sans-serif; font-weight: 800; letter-spacing: -0.02em; }

    /* ─── 통일된 버튼 시스템 (KRAFTON Brand Style) ─────────────────── */
    /* 공통: 사각형, 대문자, 트래킹, 빠른 transition */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 0;
      border: 1px solid transparent;
      transition: all 0.15s ease;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    /* Primary: 오렌지 필 */
    .btn-primary { background: #f9423a; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #dc352d; }
    /* Secondary: 검정 필 */
    .btn-secondary { background: #000; color: #fff; }
    .btn-secondary:hover:not(:disabled) { background: #222; }
    /* Outline (light): 흰 배경 + 검정 테두리 */
    .btn-outline { background: #fff; color: #000; border-color: rgba(0,0,0,0.2); }
    .btn-outline:hover:not(:disabled) { border-color: #000; background: #000; color: #fff; }
    /* Outline-dark: 검정 배경 위에서 */
    .btn-outline-dark { background: transparent; color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
    .btn-outline-dark:hover:not(:disabled) { color: #fff; border-color: #fff; }
    /* Ghost: 외곽선 없음 */
    .btn-ghost { background: transparent; color: rgba(0,0,0,0.6); }
    .btn-ghost:hover:not(:disabled) { color: #000; background: rgba(0,0,0,0.04); }
    /* 사이즈 */
    .btn-sm { padding: 0.5rem 0.875rem; font-size: 0.6875rem; letter-spacing: 0.1em; }
    .btn-lg { padding: 1rem 1.75rem; font-size: 0.8125rem; letter-spacing: 0.15em; }
    .btn-block { width: 100%; }

    /* ─── 섹션 헤더 시스템 (KRAFTON 구조적 헤더) ───────────────────── */
    /* 사용 예: <div class="sec-head"><div class="sec-head-left"><span class="sec-num">01</span><h3 class="sec-title">영상 파일</h3></div><p class="sec-hint">...</p></div> */
    .sec-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      padding-bottom: 0.625rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }
    .sec-head-left {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      min-width: 0;
    }
    .sec-num {
      font-size: 0.8125rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: #f9423a;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .sec-title {
      font-size: 1.125rem;
      font-weight: 800;
      color: #000;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .sec-hint {
      font-size: 0.8125rem;
      color: rgba(0, 0, 0, 0.45);
      letter-spacing: 0;
      text-align: right;
      flex-shrink: 0;
    }
    /* 서브 섹션 (콘텐츠 유형 내부의 '구성 디테일' 등) — 왼쪽 정렬, 꺾쇠 없음 */
    .subsec-wrap {
      margin-top: 0.875rem;
    }
    .subsec-head {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      margin-bottom: 0.5rem;
    }
    .subsec-title {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(0, 0, 0, 0.55);
    }
    .subsec-arrow {
      display: none; /* L 꺾쇠 CSS가 시각 신호 담당 → 인라인 화살표는 숨김 */
    }
    /* 상위 콘텐츠 유형 버튼 (가득 차고 큼직하게) */
    .ct-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .ct-grid > button + button {
      margin-left: -1px;
    }
    .ct-btn {
      padding: 1rem 0.75rem;
      font-size: 0.9375rem;
      font-weight: 700;
      border: 1px solid rgba(0, 0, 0, 0.15);
      background: #fff;
      color: rgba(0, 0, 0, 0.7);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .ct-btn:hover {
      border-color: #000;
      color: #000;
      z-index: 1;
    }
    .ct-btn.ct-btn-on {
      background: #f9423a;
      border-color: #f9423a;
      color: #fff;
      z-index: 2;
    }
    /* 하위 디테일 버튼 (작게 — 하위임을 강조) */
    .sub-btn {
      flex: 1;
      padding: 0.4375rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid rgba(0, 0, 0, 0.15);
      background: #fff;
      color: rgba(0, 0, 0, 0.6);
      transition: all 0.15s;
    }
    .sub-btn:hover { border-color: #000; color: #000; }
    .sub-btn.sub-btn-on {
      background: #f9423a;
      border-color: #f9423a;
      color: #fff;
    }
    .sub-row { display: flex; gap: 0; }
    .sub-row > button + button { margin-left: -1px; }
    /* 단계 컨테이너 (01·02·03·04 사이의 명확한 구분) */
    .steps > * + * {
      margin-top: 2.75rem;
      padding-top: 2rem;
      border-top: 1px dashed rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body class="bg-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Electron API 래퍼 (웹 브라우저로 열었을 때도 동작하도록 폴백) ──────
    const eAPI = window.electronAPI || null;
    const isElectron = !!eAPI;

    // 저장소 헬퍼: Electron이면 electron-store, 아니면 localStorage
    const storage = {
      get: async (key) => {
        if (isElectron) return eAPI.storeGet(key);
        const v = localStorage.getItem(key);
        try { return v ? JSON.parse(v) : null; } catch { return v; }
      },
      set: async (key, value) => {
        if (isElectron) return eAPI.storeSet(key, value);
        localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
      },
    };

    const icons = {
      FileSpreadsheet: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      ),
      Key: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
        </svg>
      ),
      Loader2: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24" className={(props.className || '') + ' animate-spin'}>
          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      ),
      AlertCircle: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      ),
      Download: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
      ),
      Save: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
        </svg>
      ),
      Video: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
      ),
      Settings: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      ),
      Upload: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
      ),
      Trash: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      ),
      Folder: (props) => (
        <svg {...props} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" />
        </svg>
      ),
    };

    const parseCSVLine = (line) => {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else current += char;
      }
      result.push(current.trim());
      return result;
    };

    const delay = (ms) => new Promise((res) => setTimeout(res, ms));

    // ─── 데모(모의) 모드 ─────────────────────────────────────────────────────
    // API 키 자리에 'MOCK'을 입력하면 Gemini 호출을 모두 건너뛰고 합성 데이터를 반환한다.
    // 실제 키에는 전혀 영향을 주지 않으며(센티넬 값에서만 동작), 키 없이 전체 파이프라인
    // (추출 → 프리필터 → AI 점수 → 중복제거 → 편집기 → 룰 생성)을 오프라인으로 테스트할 수 있다.
    const MOCK_KEY = 'MOCK';
    const isMockKey = (k) => typeof k === 'string' && k.trim().toUpperCase() === MOCK_KEY;

    // 문자열 → [0,1) 안정적 의사난수 (FNV-1a). 같은 프레임은 항상 같은 값,
    // 다른 프레임은 서로 다른 값 → 점수가 적절히 흩어져 중복제거/랭킹이 현실적으로 동작.
    const seededUnit = (str) => {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
      return ((h >>> 0) % 100000) / 100000;
    };

    // 합성 피처 객체 — GEMINI_ANALYSIS_PROMPT_BASE 스키마를 그대로 따른다.
    // scoreFrameBase / scoreContentType / getReasons / 룰 생성(validData)이 읽는 모든 필드를
    // 채워서 다운스트림 코드가 undefined를 만나지 않도록 한다.
    const mockFeatures = (seedStr, opts = {}) => {
      const u = (salt) => seededUnit(seedStr + '|' + salt);
      const pick = (val, arr) => arr[Math.min(arr.length - 1, Math.floor(val * arr.length))];
      const r2 = (n) => parseFloat(n.toFixed(2));
      const realPerson = u('rp') > 0.6;
      return {
        visual_features: {
          action_intensity: pick(u('act'), ['low', 'medium', 'high', 'high']),
          character_size: pick(u('csize'), ['none', 'small', 'medium', 'large', 'large']),
          character_prominence: r2(u('cp')),
          character_pose: pick(u('pose'), ['dynamic', 'dynamic', 'idle', 'none']),
          character_visibility: pick(u('cvis'), ['clear', 'clear', 'obscured', 'none']),
          character_types: realPerson ? ['real_person'] : ['game_character'],
          human_presence: realPerson ? (u('celeb') > 0.5 ? ['celebrity'] : ['person']) : [],
          face_detected: realPerson ? u('face') > 0.3 : u('face') > 0.85,
          face_size_ratio: r2(u('fsr') * 0.4),
          ui_clutter_level: pick(u('ui'), ['none', 'none', 'low', 'high']),
          ui_clutter_score: r2(u('uis')),
          subject_reveal: pick(u('reveal'), ['full', 'partial', 'silhouette']),
          subject_scale: r2(u('ss')),
          group_size: pick(u('grp'), ['solo', 'duo', 'small_group', 'large_group']),
          item_visibility: pick(u('item'), ['none', 'partial', 'prominent']),
          motion_energy: r2(u('me')),
        },
        color_features: {
          brightness: r2(0.35 + u('br') * 0.4),
          saturation: r2(0.3 + u('sat') * 0.5),
          contrast: r2(0.3 + u('con') * 0.5),
          dominant_colors: [{ hex: '#3a5f8a', ratio: 0.4 }, { hex: '#c0743a', ratio: 0.25 }],
        },
        composition: {
          subject_isolation: pick(u('iso'), ['single', 'single', 'few', 'crowded']),
          rule_of_thirds: u('rot') > 0.4,
          depth_layers: pick(u('depth'), ['deep', 'medium', 'flat']),
          negative_space_available: u('neg') > 0.45,
          text_overlay: pick(u('txt'), ['none', 'none', 'minimal', 'heavy']),
          text_area_ratio: r2(u('tar') * 0.3),
          weapon_or_item_present: u('wp') > 0.5,
          camera_feel: pick(u('cam'), ['dynamic', 'static', 'cinematic']),
        },
        content: {
          scene_type: pick(u('scene'), ['combat', 'combat', 'victory', 'traversal', 'cinematic', 'lobby', 'other']),
          is_gameplay: u('gp') > 0.3,
          real_person_present: realPerson,
          iconic_character_present: u('icon') > 0.7,
          game_relevance_score: r2(u('grs')),
          ...(opts.withUserIntent ? { user_intent_match: r2(u('intent')) } : {}),
        },
        engagement: {
          attention_score: r2(0.4 + u('att') * 0.5),
          emotional_intensity: r2(u('emo')),
          ...(opts.withContentFit ? { content_fit: pick(u('cf'), ['high', 'medium', 'low']) } : {}),
        },
      };
    };

    // ─── 동시성 제한 병렬 실행 (Gemini 속도 최적화용) ────────────────────────
    // concurrency개씩 동시에 실행하고, 429 에러는 fetchWithGeminiRetry가 재시도 처리함
    // 유료 등급(Tier 1, ~1000 RPM) 기준. 429가 잦으면 낮출 것 — 전역 쿨다운이 폭주는 막아줌
    const GEMINI_CONCURRENCY = 16;
    const parallelMap = async (items, fn, concurrency = 4, onProgress = null) => {
      const results = new Array(items.length).fill(null);
      const queue = items.map((item, i) => ({ item, i }));
      let completed = 0;
      const worker = async () => {
        while (queue.length > 0) {
          const task = queue.shift();
          if (!task) break;
          const { item, i } = task;
          try {
            results[i] = await fn(item, i);
          } catch (err) {
            console.error(`[parallelMap] 항목 ${i} 실패:`, err.message);
            results[i] = null;
          }
          completed++;
          if (onProgress) onProgress(completed, items.length);
        }
      };
      await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, worker));
      return results.filter(r => r !== null);
    };

    // ─── Base64 데이터URL → ImageData 변환 (createImageBitmap, 메인 스레드 밖 디코드) ──
    // targetWidth 지정 시 디코드와 동시에 다운스케일 (픽셀 통계용 — Gemini에는 원본 전달)
    const STATS_ANALYSIS_WIDTH = 640;
    const decodeBase64ToImageData = async (base64DataUrl, targetWidth = null) => {
      const blob = await (await fetch(base64DataUrl)).blob();
      const bmp = await createImageBitmap(blob, targetWidth ? { resizeWidth: targetWidth, resizeQuality: 'low' } : {});
      const canvas = document.createElement('canvas');
      canvas.width = bmp.width;
      canvas.height = bmp.height;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(bmp, 0, 0);
      bmp.close();
      return ctx.getImageData(0, 0, canvas.width, canvas.height);
    };

    // ─── Gemini File API: 영상 업로드 ─────────────────────────────────────────
    // Electron: videoPath (문자열) → file:// 로 읽어서 Blob 생성 후 업로드
    // 웹: videoFile (File 객체) 직접 업로드
    // 503/UNAVAILABLE 등 일시적 Gemini File API 장애 시 지수 백오프로 자동 재시도
    const uploadVideoToGemini = async (videoSource, apiKey, onProgress) => {
      if (isMockKey(apiKey)) {
        // 업로드 진행률 애니메이션만 흉내내고 가짜 파일 핸들 반환
        for (let p = 0; p <= 1.0001; p += 0.25) { if (onProgress) onProgress(Math.min(1, p)); await delay(120); }
        return { name: 'files/mock-demo', uri: 'mock://demo', mimeType: 'video/mp4' };
      }
      let file;
      if (isElectron && typeof videoSource === 'string') {
        // Electron: 로컬 파일 경로를 fetch로 읽어 Blob으로 변환
        const resp = await fetch(`file://${videoSource}`);
        const blob = await resp.blob();
        const fileName = videoSource.split('/').pop();
        file = new File([blob], fileName, { type: blob.type || 'video/mp4' });
      } else {
        file = videoSource; // 웹 모드: File 객체 그대로
      }

      // 단일 업로드 시도 (XHR 기반, 진행률 콜백 지원)
      const attemptUpload = () => new Promise((resolve, reject) => {
        const url = `https://generativelanguage.googleapis.com/upload/v1beta/files?uploadType=multipart&key=${apiKey}`;
        const metadata = { file: { display_name: file.name, mime_type: file.type || 'video/mp4' } };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', file);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', url);
        xhr.upload.onprogress = (e) => { if (e.lengthComputable && onProgress) onProgress(e.loaded / e.total); };
        xhr.onload = () => {
          if (xhr.status === 200) {
            try { resolve(JSON.parse(xhr.responseText).file); }
            catch (e) { const err = new Error('업로드 응답 파싱 실패'); err.status = xhr.status; err.retryable = false; reject(err); }
          } else {
            const err = new Error(`업로드 실패: ${xhr.status} ${xhr.responseText}`);
            err.status = xhr.status;
            // 5xx + 429(rate limit)는 재시도 가능, 4xx(401/403/400 등)는 재시도 무의미
            err.retryable = xhr.status >= 500 || xhr.status === 429 || xhr.status === 0;
            reject(err);
          }
        };
        xhr.onerror = () => {
          const err = new Error('네트워크 오류 (업로드)');
          err.status = 0;
          err.retryable = true;
          reject(err);
        };
        xhr.ontimeout = () => {
          const err = new Error('업로드 타임아웃');
          err.status = 0;
          err.retryable = true;
          reject(err);
        };
        xhr.send(form);
      });

      // 지수 백오프 재시도 (최대 5회)
      const MAX_ATTEMPTS = 5;
      let lastErr;
      for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
        try {
          return await attemptUpload();
        } catch (err) {
          lastErr = err;
          if (!err.retryable || attempt === MAX_ATTEMPTS) throw err;
          // 백오프: 1.5s, 3s, 6s, 12s (+지터)
          const backoffMs = 1500 * Math.pow(2, attempt - 1) + Math.random() * 500;
          if (onProgress) onProgress(0); // 진행률 0으로 리셋 (UI에 재시도 안내용)
          console.warn(`[uploadVideoToGemini] 시도 ${attempt}/${MAX_ATTEMPTS} 실패 (${err.status || 'net'}) — ${Math.round(backoffMs)}ms 후 재시도`);
          await new Promise((r) => setTimeout(r, backoffMs));
        }
      }
      throw lastErr;
    };

      const deadline = Date.now() + maxWaitMs;
      let interval = 500; // 짧은 영상은 수 초 내 ACTIVE — 빠르게 시작해서 점점 늘림
      while (Date.now() < deadline) {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${fileName}?key=${apiKey}`);
        const data = await res.json();
        if (data.state === 'ACTIVE') return data;
        if (data.state === 'FAILED') throw new Error('Gemini 파일 처리 실패');
        await delay(interval);
        interval = Math.min(3000, interval * 1.6);

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      let promptText = getVideoSelectionPrompt(ct, duration);
      if (userContext && userContext.trim()) {

      }
      // 영상 스토리 스캔 + 타임스탬프 선정을 한 번에 받기 위해 JSON 객체 형식으로 응답 요구
      const contextPrompt = promptText +
        '\n\n【중요 출력 형식】\n위의 JSON 배열 지시 대신, 반드시 아래 JSON 객체 형식으로만 응답하세요 (다른 텍스트 없이):\n{"video_context": "영상 전체의 핵심 내용·스토리·분위기·주요 이벤트를 2~3문장으로 요약", "timestamps": [{"timestamp": 12.5, "reason": "선정 이유"}, ...]}';
      const body = JSON.stringify({
        contents: [{ parts: [
          { file_data: { mime_type: 'video/mp4', file_uri: fileUri } },
          { text: contextPrompt },
        ]}],
      });
      const response = await fetchWithGeminiRetry(url, body, 5, signal);
      const data = await response.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

      const cleanJson = (s) => s
        .replace(/[\x00-\x1F\x7F]/g, ' ')
        .replace(/,\s*}/g, '}')
        .replace(/,\s*]/g, ']');

      // 1차: JSON 객체 형식 { video_context, timestamps } 파싱
      const objStart = text.indexOf('{');
      const objEnd = text.lastIndexOf('}');
      if (objStart !== -1 && objEnd > objStart) {
        const objStr = text.slice(objStart, objEnd + 1);
        const tryParseObj = (s) => {
          try {
            const parsed = JSON.parse(s);
            if (parsed.timestamps && Array.isArray(parsed.timestamps)) {
              return { timestamps: parsed.timestamps, videoContext: parsed.video_context || null };
            }
          } catch {}
          return null;
        };
        const direct = tryParseObj(objStr);
        if (direct) return direct;
        const cleanedResult = tryParseObj(cleanJson(objStr));
        if (cleanedResult) return cleanedResult;

        // 1차 정규식 폴백: 객체에서 video_context + timestamp만 추출
        const vcMatch = objStr.match(/"video_context"\s*:\s*"((?:[^"\\]|\\.)*)"/);
        const objTsFallback = [...objStr.matchAll(/"timestamp"\s*:\s*([\d.]+)/g)]
          .map(m => ({ timestamp: parseFloat(m[1]), reason: '' }));
        if (objTsFallback.length > 0) return { timestamps: objTsFallback, videoContext: vcMatch?.[1] || null };
      }

      // 2차 폴백: 기존 배열 형식(하위 호환) — video_context 없이 반환
      const start = text.indexOf('[');
      const end = text.lastIndexOf(']');
      if (start === -1 || end === -1 || end <= start) throw new Error(`타임스탬프 선정 실패. 응답: ${text.slice(0, 200)}`);
      const jsonStr = text.slice(start, end + 1);

      try { return { timestamps: JSON.parse(jsonStr), videoContext: null }; } catch {}
      try { return { timestamps: JSON.parse(cleanJson(jsonStr)), videoContext: null }; } catch {}

      // 3차 폴백: 정규식으로 timestamp 값만 안전하게 추출
      const tsFallback = [...jsonStr.matchAll(/"timestamp"\s*:\s*([\d.]+)/g)]
        .map(m => ({ timestamp: parseFloat(m[1]), reason: '(특수문자로 인해 이유 생략)' }));
      if (tsFallback.length > 0) return { timestamps: tsFallback, videoContext: null };

      throw new Error(`JSON 파싱 실패. 응답: ${text.slice(0, 300)}`);
    };

이 영상은 3D 모션 그래픽으로 제작된 티징/예고 영상입니다. 아래 기준을 최우선으로 평가하세요:
- ui_clutter_level이 "none"(UI 완전 없음)이고 depth_layers가 "deep"(3D 공간감)인 장면을 최고점으로 처리하세요.
- scene_type이 "cinematic"이거나 is_gameplay가 false인 장면을 높게 평가하세요. is_gameplay 여부로 감점하지 마세요.
- subject_reveal이 "silhouette"(실루엣) 또는 "partial"(일부 노출)인 장면을 강하게 선호하세요.
- 역동적인 카메라 연출(depth_layers "deep", rule_of_thirds, negative_space)이 잘 활용된 장면을 선호하세요.
- action_intensity가 "high"여도 3D 모션 그래픽 특유의 연출이면 긍정적으로 평가하세요.
- character_size "small" 또는 "none"이어도 3D 그래픽 연출 목적이라면 낮게 평가하지 마세요.`;
        case 'gameplay_cinematic':
          return `\n\n【분석 목적: 인게임+시네마틱 혼합 콘텐츠】
이 영상은 인게임 플레이 장면과 시네마틱 컷씬이 혼합된 영상입니다. 아래 기준을 최우선으로 평가하세요:
- 인게임 장면: action_intensity "high", character_size "large" 또는 "medium", scene_type "combat" 조합을 높게 평가하세요.
- 시네마틱 장면: is_gameplay가 false이더라도 character_size "large", depth_layers "deep", ui_clutter_level "none"인 장면을 높게 평가하세요.
- 두 유형 모두 character_size "small" 또는 "none"인 배경 위주 컷은 낮게 평가하세요.
- is_gameplay 여부로 감점하지 마세요. 시네마틱과 인게임을 동등하게 평가하세요.`;
        case 'celebrity_solo':
          return `\n\n【분석 목적: 셀러브리티 1인 콘텐츠】
이 영상은 실제 인물 1인이 주인공인 영상입니다. 아래 기준을 최우선으로 평가하세요:
- real_person_present가 true이고 face_detected가 true인 장면을 최고점으로 처리하세요.
- character_size는 단일 인물 개인 기준으로 판단하세요. "large"(화면 40% 이상)이고 얼굴이 선명한 장면을 강하게 선호하세요.
- subject_reveal이 "full"(전신/상반신 이상 노출)인 장면에 추가 가점을 주세요.
- character_visibility가 "clear"(명확히 식별)인 장면을 선호하고, "obscured"(가려짐)는 낮게 평가하세요.
- 게임 캐릭터만 있고 real_person_present가 false인 장면, 인물이 배경에 묻히거나 작은 장면은 강하게 낮게 평가하세요.`;
        case 'celebrity_group':
          return `\n\n【분석 목적: 셀러브리티 그룹 콘텐츠】
이 영상은 실제 인물 여럿이 함께 등장하는 영상입니다. 아래 기준을 최우선으로 평가하세요:
- character_size는 그룹 전체를 하나의 피사체로 보고 판단하세요. 그룹 전체가 화면의 40% 이상이면 "large"로 평가하세요.
- group_size가 "small_group"(3~5명)이고 그룹 전체가 화면에 크게 담긴 단체 샷을 최고점으로 처리하세요. 얼굴 클로즈업이 아닌 전신/상반신 단체샷도 동등하게 높게 평가하세요.
- face_detected가 true이면 추가 보너스이지만, 그룹 전신/상반신샷에서 개별 얼굴이 작더라도 인물이 명확히 식별 가능하면 높게 평가하세요.
- subject_reveal이 "full"(전신 또는 상반신이 모두 화면에 담긴 그룹샷)인 장면을 강하게 선호하세요.
- group_size "duo"(2인)도 두 인물이 모두 화면에 크게 담기면 높게 평가하세요.
- 배경이나 환경 위주이고 실제 인물이 작거나 없는 장면, real_person_present가 false인 장면은 강하게 낮게 평가하세요.`;
        default:
          return '';
      }
    };

    const getGeminiAnalysisPrompt = (ct, videoContext = null) => {
      const contextBlock = videoContext
        ? `[영상 전체 내용 요약]\n${videoContext}\n\n위 요약을 참고하여 항목 15(content_fit)를 평가하세요.\n\n`
        : '';
      return contextBlock + GEMINI_ANALYSIS_PROMPT_BASE + getContentTypeInstruction(ct);
    };

    const MAX_DEBUG_LOGS = 50;
    let geminiDebugLogger = null;
    const setGeminiDebugLogger = (fn) => { geminiDebugLogger = fn; };
    const recordGeminiLog = (entry) => {
      if (typeof geminiDebugLogger === 'function') geminiDebugLogger(entry);
    };

    // 429 발생 시 모든 병렬 워커가 함께 대기하도록 하는 전역 쿨다운
    let geminiCooldownUntil = 0;
    const awaitGeminiCooldown = async () => {
      let wait;
      while ((wait = geminiCooldownUntil - Date.now()) > 0) await delay(wait);
    };

    const fetchWithGeminiRetry = async (url, body, maxRetries = 5, signal = null) => {
      let attempt = 0;
      while (true) {
        if (signal?.aborted) throw new DOMException('사용자가 취소함', 'AbortError');
        await awaitGeminiCooldown();
        const startedAt = Date.now();
        let response;
        let networkError = null;
        try {
          response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body, signal });
        } catch (err) {
          if (err?.name === 'AbortError') throw err;
          networkError = err;
        }
        const duration = Date.now() - startedAt;
        if (!response) {
          recordGeminiLog({ id: crypto.randomUUID(), timestamp: new Date().toISOString(), attempt: attempt + 1, status: 'network-error', duration, message: networkError?.message || '네트워크 오류' });
          if (attempt < maxRetries) { await delay(Math.min(60000, 5000 * (attempt + 1))); attempt++; continue; }
          throw networkError || new Error('알 수 없는 네트워크 오류');
        }
        recordGeminiLog({ id: crypto.randomUUID(), timestamp: new Date().toISOString(), attempt: attempt + 1, status: response.status, duration, message: `${response.status}` });
        if (response.ok) return response;
        if (response.status === 429 && attempt < maxRetries) {
          const retryAfter = parseFloat(response.headers.get('Retry-After'));
          const waitMs = !isNaN(retryAfter) ? retryAfter * 1000 : Math.min(60000, 5000 * (attempt + 1));
          geminiCooldownUntil = Math.max(geminiCooldownUntil, Date.now() + waitMs);
          await awaitGeminiCooldown();
          attempt++;
          continue;
        }
        const errorText = await response.text();
        throw new Error(`API 오류 ${response.status}: ${errorText || '알 수 없음'}`);
      }
    };

    // ─── RulesGenerator ─────────────────────────────────────────────────────
    function RulesGenerator({ geminiApiKey, setGeminiApiKey, rules, setRules }) {
      const [step, setStep] = useState(0);
      const [parsedData, setParsedData] = useState(null);
      const [analyzedData, setAnalyzedData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [progress, setProgress] = useState({ current: 0, total: 0, msg: '' });
      const [backupCount, setBackupCount] = useState(0);
      // API 키 입력 UI 상태
      const [apiKeyVisible, setApiKeyVisible] = useState(false);
      const [apiKeyDraft, setApiKeyDraft] = useState('');
      const [apiKeyEditing, setApiKeyEditing] = useState(false);
      const [apiKeySaved, setApiKeySaved] = useState(false);
      const maskedApiKey = geminiApiKey ? (geminiApiKey.length > 10 ? geminiApiKey.slice(0, 6) + '••••••••' + geminiApiKey.slice(-4) : '••••••••') : '';

      useEffect(() => { if (geminiApiKey) setStep(0.5); }, [geminiApiKey]);

      const handleExcelUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setLoading(true); setError('');
        try {
          const text = await file.text();
          const lines = text.split('\n').filter((l) => l.trim());
          const headers = parseCSVLine(lines[0]).map((h) => h.trim().toLowerCase().replace(/['"]/g, ''));
          const videoIdIdx = headers.findIndex((h) => h.includes('id') || h.includes('콘텐츠') || h.includes('content'));
          const ctrIdx = headers.findIndex((h) => h.includes('ctr') || h.includes('클릭률'));
          const titleIdx = headers.findIndex((h) => h.includes('제목'));
          if (videoIdIdx === -1 || ctrIdx === -1) throw new Error('필수 컬럼 없음');
          const videos = [];
          for (let i = 1; i < lines.length; i++) {
            const cols = parseCSVLine(lines[i]);
            const videoId = cols[videoIdIdx]?.trim().replace(/['"]/g, '');
            let ctr = parseFloat(cols[ctrIdx]?.trim().replace(/['",%]/g, ''));
            if (ctr > 100) ctr = ctr / 1000000;
            else if (ctr < 1 && ctr > 0) ctr = ctr * 100;
            const title = titleIdx !== -1 ? cols[titleIdx]?.trim().replace(/['"]/g, '') : `영상 ${i}`;
            if (videoId && videoId.length > 5 && !isNaN(ctr) && ctr >= 0 && ctr <= 100) {
              videos.push({ video_id: videoId, title, ctr, thumbnail_url: `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg` });
            }
          }
          setParsedData({ total: videos.length, videos: videos.sort((a, b) => b.ctr - a.ctr) });
          setStep(1);
        } catch (err) { setError('파일 오류: ' + err.message); }
        finally { setLoading(false); }
      };

      const analyzeWithGeminiRules = async (imageBase64) => {
        if (isMockKey(geminiApiKey)) { await delay(60); return mockFeatures(String(imageBase64).slice(0, 80), { withContentFit: true }); }
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`;
        const body = JSON.stringify({
          contents: [{ parts: [
            { text: GEMINI_ANALYSIS_PROMPT },
            { inline_data: { mime_type: 'image/jpeg', data: imageBase64 } }
          ]}],
        });
        const response = await fetchWithGeminiRetry(apiUrl, body);
        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('JSON 응답 없음');
        return JSON.parse(jsonMatch[0]);
      };

      const autoBackup = (data, index) => {
        const blob = new Blob([JSON.stringify({ data, timestamp: new Date().toISOString(), last_index: index }, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup-${data.length}items-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const analyzeAll = async () => {
        if (!parsedData || !geminiApiKey) return;
        setLoading(true); setError('');
        const analyzed = [], failed = [];
        const total = parsedData.videos.length;
        setProgress({ current: 0, total, msg: '병렬 분석 시작...' });
        // 429는 fetchWithGeminiRetry의 전역 쿨다운이 모든 워커를 함께 멈춰서 처리
        await parallelMap(parsedData.videos, async (video) => {
          try {
            const urls = [video.thumbnail_url, video.thumbnail_url.replace('maxresdefault', 'hqdefault')];
            let features = null;
            for (const u of urls) {
              try {
                const res = await fetch(u);
                if (!res.ok) continue;
                const blob = await res.blob();
                const base64 = await new Promise((r) => { const fr = new FileReader(); fr.onloadend = () => r(fr.result.split(',')[1]); fr.readAsDataURL(blob); });
                features = await analyzeWithGeminiRules(base64);
                break;
              } catch {}
            }
            if (features) analyzed.push({ video, features, thumbnail_url: video.thumbnail_url });
            else failed.push(video.title);
          } catch { failed.push(video.title); }
          return true;
        }, 8, (done) => {
          setProgress({ current: done, total, msg: `${done}/${total} 분석 완료` });
          if (done % 50 === 0) { autoBackup(analyzed, done); setBackupCount((p) => p + 1); }
        });
        if (analyzed.length === 0) { setError('모든 분석 실패'); setLoading(false); return; }
        autoBackup(analyzed, total);
        setAnalyzedData(analyzed);
        setStep(2);
        setLoading(false);
      };

      const generateRules = async () => {
        if (!analyzedData || analyzedData.length === 0) return;
        setLoading(true);
        try {
          const validData = analyzedData.filter((item) => item?.features?.visual_features && item?.features?.color_features && item?.features?.engagement);
          if (validData.length < 4) throw new Error('유효 데이터 부족');
          const sorted = [...validData].sort((a, b) => b.video.ctr - a.video.ctr);
          const mid = Math.floor(sorted.length / 2);
          const high = sorted.slice(0, mid), low = sorted.slice(mid);
          const stat = (g) => ({
            avg_ctr: g.reduce((s, i) => s + i.video.ctr, 0) / g.length,
            face_usage: (g.filter((i) => i.features.visual_features.face_detected).length / g.length) * 100,
            avg_brightness: g.reduce((s, i) => s + i.features.color_features.brightness, 0) / g.length,
            avg_saturation: g.reduce((s, i) => s + i.features.color_features.saturation, 0) / g.length,
            avg_attention: g.reduce((s, i) => s + i.features.engagement.attention_score, 0) / g.length,
          });
          const newRules = {
            stats: { high_performers: stat(high), low_performers: stat(low) },
            analyzed_count: validData.length,
            created_at: new Date().toISOString(),
            ctr_range: { max: Math.max(...validData.map((v) => v.video.ctr)), min: Math.min(...validData.map((v) => v.video.ctr)), median: sorted[mid].video.ctr },
          };
          setRules(newRules);
          await storage.set('thumbnailRules', newRules); // ← electron-store 저장
          setStep(3);
        } catch (err) { setError('규칙 생성 오류: ' + err.message); }
        finally { setLoading(false); }
      };

      const downloadRules = () => {
        if (!rules) return;
        const blob = new Blob([JSON.stringify(rules, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'thumbnail-rules.json'; a.click();
        URL.revokeObjectURL(url);
      };

      const mergeBackupData = (data) => {
        const validData = data.filter((item) => item?.features?.visual_features && item?.features?.color_features && item?.features?.engagement);
        const sorted = [...validData].sort((a, b) => b.video.ctr - a.video.ctr);
        const mid = Math.floor(sorted.length / 2);
        const high = sorted.slice(0, mid), low = sorted.slice(mid);
        const calcStats = (g) => ({
          avg_ctr: g.reduce((s, i) => s + i.video.ctr, 0) / g.length,
          face_usage: (g.filter((i) => i.features.visual_features.face_detected).length / g.length) * 100,
          avg_brightness: g.reduce((s, i) => s + i.features.color_features.brightness, 0) / g.length,
          avg_saturation: g.reduce((s, i) => s + i.features.color_features.saturation, 0) / g.length,
          avg_attention: g.reduce((s, i) => s + i.features.engagement.attention_score, 0) / g.length,
        });
        return { stats: { high_performers: calcStats(high), low_performers: calcStats(low) }, analyzed_count: validData.length, created_at: new Date().toISOString(), merged_from_backups: true };
      };

      const handleMultipleRulesUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        try {
          const allData = [];
          for (const file of files) {
            const text = await file.text();
            const json = JSON.parse(text);
            if (json.data && Array.isArray(json.data)) allData.push(...json.data);
            else if (json.stats) { await storage.set('thumbnailRules', json); setRules(json); alert('규칙 로드 완료!'); return; }
          }
          if (allData.length > 0) {
            const merged = mergeBackupData(allData);
            await storage.set('thumbnailRules', merged);
            setRules(merged);
            alert(`${files.length}개 파일 병합 완료!`);
          }
        } catch (err) { alert('파일 오류: ' + err.message); }
      };

      return (
        <div className="space-y-6">
          <div className="bg-white rounded-none shadow p-7">
            <div className="sec-head">
              <div className="sec-head-left">
                <span className="sec-num">01</span>
                <h3 className="sec-title">API 키 <span className="text-[11px] tracking-[0.15em] uppercase text-black/35 font-bold ml-1.5">API KEY</span></h3>
              </div>
              <p className="sec-hint">
                {isMockKey(geminiApiKey)
                  ? <span className="inline-flex items-center gap-1.5"><span className="inline-block w-2 h-2 rounded-full bg-[#f9423a]" />🧪 데모(모의) 모드</span>
                  : geminiApiKey
                  ? <span className="inline-flex items-center gap-1.5"><span className="inline-block w-2 h-2 rounded-full bg-[#f9423a]" />저장됨</span>
                  : <span className="inline-flex items-center gap-1.5"><span className="inline-block w-2 h-2 rounded-full bg-black/25" />미설정</span>
                }
              </p>
            </div>
            {(!geminiApiKey || apiKeyEditing) ? (
              <div className="space-y-3">
                <div className="flex items-stretch gap-2">
                  <input
                    type={apiKeyVisible ? 'text' : 'password'}
                    className="flex-1 rounded-none border border-black/15 focus:border-[#f9423a] focus:outline-none px-4 py-2.5 text-sm font-mono"
                    placeholder="AIza..."
                    value={apiKeyDraft}
                    onChange={(e) => setApiKeyDraft(e.target.value)}
                  />
                  <button
                    type="button"
                    onClick={() => setApiKeyVisible((v) => !v)}
                    className="btn btn-outline btn-md"
                    title={apiKeyVisible ? '숨기기' : '보기'}
                  >{apiKeyVisible ? '숨기기' : '보기'}</button>
                </div>
                <div className="flex gap-2">
                  <button
                    type="button"
                    disabled={!apiKeyDraft.trim()}
                    onClick={async () => {
                      const trimmed = apiKeyDraft.trim();
                      setGeminiApiKey(trimmed);
                      await storage.set('geminiApiKey', trimmed);
                      setApiKeyEditing(false);
                      setApiKeyDraft('');
                      setApiKeyVisible(false);
                      setApiKeySaved(true);
                      setTimeout(() => setApiKeySaved(false), 2000);
                    }}
                    className="btn btn-primary btn-md"
                  >저장</button>
                  {geminiApiKey && (
                    <button
                      type="button"
                      onClick={() => { setApiKeyEditing(false); setApiKeyDraft(''); setApiKeyVisible(false); }}
                      className="btn btn-outline btn-md"
                    >취소</button>
                  )}
                </div>
              </div>
            ) : (
              <div className="space-y-3">
                <div className="flex items-center gap-3 bg-black/[0.03] border border-black/10 px-4 py-3">
                  <icons.Key className="w-4 h-4 text-[#f9423a] flex-shrink-0" />
                  <code className="text-sm font-mono text-black/80 flex-1 break-all">{apiKeyVisible ? geminiApiKey : maskedApiKey}</code>
                  <button
                    type="button"
                    onClick={() => setApiKeyVisible((v) => !v)}
                    className="text-xs uppercase tracking-[0.12em] font-bold text-black/60 hover:text-black"
                  >{apiKeyVisible ? '숨기기' : '보기'}</button>
                </div>
                <div className="flex gap-2">
                  <button
                    type="button"
                    onClick={() => { setApiKeyDraft(geminiApiKey || ''); setApiKeyEditing(true); }}
                    className="btn btn-outline btn-md"
                  >키 변경</button>
                  <button
                    type="button"
                    onClick={async () => {
                      if (!confirm('저장된 API 키를 삭제하시겠습니까?')) return;
                      setGeminiApiKey('');
                      await storage.set('geminiApiKey', '');
                      setApiKeyVisible(false);
                    }}
                    className="btn btn-outline btn-md"
                  >삭제</button>
                  {apiKeySaved && <span className="self-center text-xs uppercase tracking-[0.12em] font-bold text-[#f9423a]">✓ 저장됨</span>}
                </div>
              </div>
            )}
            <p className="text-xs text-black/50 mt-4">
              키 발급: <a href="https://aistudio.google.com/app/apikey" target="_blank" className="underline hover:text-black">Google AI Studio</a>
              <span className="mx-2">·</span>
              {isElectron ? '앱 설정에 안전하게 보관됩니다' : '브라우저 로컬 스토리지에 저장됩니다'}
            </p>
          </div>
          <div className="bg-white rounded-none shadow p-7">
            <div className="sec-head">
              <div className="sec-head-left">
                <span className="sec-num">02</span>

    function GeminiDebugPanel({ logs, onClear }) {
      if (!logs.length) return (

    // ─── FrameExtractor ─────────────────────────────────────────────────────
    function FrameExtractor({ geminiApiKey, setGeminiApiKey, rules, setRules }) {
      // 자연어 컨셉/주제 입력 (영상 컨셉, 강조 포인트 등)
      const [userContext, setUserContext] = useState('');
      // 분석 취소용 AbortController
      const abortControllerRef = useRef(null);
      // 드래그앤드랍 상태
      const [isDragging, setIsDragging] = useState(false);

      // Electron: videoPath = 파일 경로 문자열 / 웹: videoFile = File 객체
      const [videoPath, setVideoPath] = useState(null);   // Electron용
      const [videoFile, setVideoFile] = useState(null);   // 웹 폴백용
      const [videoName, setVideoName] = useState('');
      const [cachedVideoDuration, setCachedVideoDuration] = useState(null); // 스캔 시 캐시
      const [extractedFrames, setExtractedFrames] = useState(null);
      const [scanHistory, setScanHistory] = useState([]);       // 추출 히스토리
      const [historyExpanded, setHistoryExpanded] = useState({}); // 항목별 펼침 상태
      const [showAllHistory, setShowAllHistory] = useState(false); // 전체 합쳐보기
      const [loading, setLoading] = useState(false);
      const [progress, setProgress] = useState({ current: 0, total: 0, msg: '' });
      const [uploadedFiles, setUploadedFiles] = useState([]);
      const [scanMode, setScanMode] = useState('video_ai');
      const [contentType, setContentType] = useState('gameplay');
      // 실제 채점·분석에 쓰이는 유형 (모든 서브옵션 제거)
      // - 모션그래픽(teasing) → 항상 teasing_3d (3D 모션그래픽 평가 기준 사용)
      // - 셀럽(celebrity) → 기본 celebrity_solo (1인 기준)
      //   그룹/단체 영상은 02 영상 컨셉 입력란에 "그룹" 키워드 등을 적어 user_intent_match로 반영
      const effectiveContentType = contentType === 'celebrity'
        ? 'celebrity_solo'
        : contentType === 'teasing'
          ? 'teasing_3d'
          : contentType;

      const [contextPreview, setContextPreview] = useState({ open: false, baseTimestamp: null, windowCenter: null, videoDuration: null, preloadedFrames: [], frames: [], loading: false, error: '' });
      const CONTEXT_FRAMES = 15;
      const CONTEXT_INTERVAL = 0.1;
      const timelineBarRef = useRef(null);
      const timelineDragRef = useRef({ active: false, previewTs: null });
      const contextCacheRef = useRef(new Map()); // 컨텍스트 프리뷰 구간 캐시 (최대 4구간)
      const [timelinePreviewTs, setTimelinePreviewTs] = useState(null); // 드래그 중 미리보기 위치
      const [zoomModal, setZoomModal] = useState({ open: false, imageUrl: '', title: '', zoom: 1 });
      // 인간 검토 단계: 프리필터 후보를 사용자가 직접 선별
      const [reviewState, setReviewState] = useState({ active: false, frames: [], selectedIdx: new Set(), resolve: null, label: '' });
      // 미분석 대기 풀: 프리필터에서 탈락하거나 검토에서 제외된 프레임들
      const [framePool, setFramePool] = useState([]);
      // 썸네일 편집기: 편집 중인 프레임 (null이면 닫힘)
      const [editingFrame, setEditingFrame] = useState(null);
      // 앱 디렉토리 경로 (템플릿 파일 접근용)
      const [appDir, setAppDir] = useState(null);

      // ── 히스토리 헬퍼 ─────────────────────────────────────────────────────
      const addToHistory = (frames, ct, mode, vidName) => {
        setScanHistory(prev => [...prev, {
          id: Date.now(),
          contentType: ct,
          scanMode: mode,
          videoName: vidName,
          videoPath: videoPath,  // 원본 영상 경로 저장 (주변 프레임 복원용)
          runAt: new Date(),
          frames,                // top 12 프레임 배열
        }]);
      };

      // 앱 디렉토리 로드 (Electron 전용)
      useEffect(() => {
        if (isElectron && eAPI.getAppDir) {
          eAPI.getAppDir().then((dir) => setAppDir(dir)).catch(() => {});
        }
      }, []);

      // ── 콘텐츠 유형에 따라 스캔 모드 자동 결정 ─────────────────────────────
      // 모션그래픽(teasing) → 전수 스캔 / 그 외 → Video-AI
      useEffect(() => {
        setScanMode(contentType === 'teasing' ? 'advanced' : 'video_ai');
      }, [contentType]);

      // Electron 진행률 이벤트 리스너 등록
      useEffect(() => {
        if (isElectron) {
          eAPI.onBatchProgress((data) => {
            setProgress((prev) => ({ ...prev, msg: `FFmpeg 프레임 추출 ${data.current}/${data.total}` }));
          });
          return () => eAPI.offBatchProgress();
        }
      }, []);

      // ── 영상 선택 ──────────────────────────────────────────────────────────
      const handleSelectVideo = async () => {
        if (isElectron) {
          const p = await eAPI.openVideoDialog();
          if (p) { setVideoPath(p); setVideoFile(null); setVideoName(p.split('/').pop()); setExtractedFrames(null); }
        }
      };

      const handleVideoFileChange = (e) => {
        const f = e.target.files[0];
        if (f) { setVideoFile(f); setVideoPath(null); setVideoName(f.name); setExtractedFrames(null); }
      };

      // 드래그앤드랍 핸들러 (Electron: 파일 절대경로 사용 / 웹: File 객체 사용)
      const handleVideoDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setIsDragging(false);
        const f = e.dataTransfer?.files?.[0];
        if (!f) return;
        // 영상 파일이 아니면 무시
        if (f.type && !f.type.startsWith('video/')) {
          alert('영상 파일만 업로드할 수 있습니다.');
          return;
        }
        if (isElectron && f.path) {
          setVideoPath(f.path);
          setVideoFile(null);
          setVideoName(f.path.split('/').pop());
          setExtractedFrames(null);
        } else {
          setVideoFile(f);
          setVideoPath(null);
          setVideoName(f.name);
          setExtractedFrames(null);
        }
      };

      const handleVideoDragOver = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!isDragging) setIsDragging(true);
      };

      const handleVideoDragLeave = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setIsDragging(false);
      };

      const hasVideo = isElectron ? !!videoPath : !!videoFile;

      // ── 규칙 저장소 ────────────────────────────────────────────────────────
      const handleMultipleRulesUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        const allData = [];
        try {
          for (const file of files) {
            const text = await file.text();
            const json = JSON.parse(text);
            if (json.data && Array.isArray(json.data)) allData.push(...json.data);
            else if (json.stats) {
              await storage.set('thumbnailRules', json);
              setRules(json);
              alert('규칙 로드 완료!');
              return;
            }
          }
          if (allData.length > 0) {
            const validData = allData.filter((item) => item?.features?.visual_features && item?.features?.color_features && item?.features?.engagement);
            const sorted = [...validData].sort((a, b) => b.video.ctr - a.video.ctr);
            const mid = Math.floor(sorted.length / 2);
            const calcStats = (g) => ({
              avg_ctr: g.reduce((s, i) => s + i.video.ctr, 0) / g.length,
              face_usage: (g.filter((i) => i.features.visual_features.face_detected).length / g.length) * 100,
              avg_brightness: g.reduce((s, i) => s + i.features.color_features.brightness, 0) / g.length,
              avg_saturation: g.reduce((s, i) => s + i.features.color_features.saturation, 0) / g.length,
              avg_attention: g.reduce((s, i) => s + i.features.engagement.attention_score, 0) / g.length,
            });
            const merged = { stats: { high_performers: calcStats(sorted.slice(0, mid)), low_performers: calcStats(sorted.slice(mid)) }, analyzed_count: validData.length, created_at: new Date().toISOString(), merged_from_backups: true };
            await storage.set('thumbnailRules', merged);
            setRules(merged);
            setUploadedFiles(files.map((f) => f.name));
            alert(`${files.length}개 파일 병합 완료!`);
          }
        } catch (err) { alert('파일 오류: ' + err.message); }
      };

      // ── 스캔 설정 ──────────────────────────────────────────────────────────
      const getScanConfig = (duration, ct) => {
        const isCeleb = isCelebrityMode(ct);
        // 셀럽 모드: 짧은 인물 컷을 놓치지 않도록 샘플 수 200으로 증가 (간격 ~2.4초)
        // analyzeCount는 20으로 줄여 Gemini 비용 유지
        const totalSamples = isCeleb
          ? Math.min(300, Math.max(80, Math.ceil(duration * 8)))
          : Math.min(120, Math.max(36, Math.ceil(duration * 4)));
        const analyzeCount = isCeleb ? 30 : 20; // 셀럽: 30컷 (인물 커버리지 확보), 나머지: 20컷
        const countLabel = isCeleb ? '300컷 → 30컷' : '120컷 → 20컷';
        const advanced = { totalSamples, analyzeCount, label: `전수 스캔 (최대 ${countLabel} 분석)` };
        return advanced;
      };

      // ── 픽셀 분석 함수들 ────────────────────────────────────────────────────
      const computeFrameDelta = (current, prev) => {
        if (!prev) return 0;
        const d1 = current.data, d2 = prev.data;
        const w = current.width, h = current.height;
        const xS = Math.floor(w * 0.25), xE = Math.floor(w * 0.75);
        const yS = Math.floor(h * 0.25), yE = Math.floor(h * 0.75);
        let totalDiff = 0, count = 0;
        for (let y = yS; y < yE; y += 6) {
          for (let x = xS; x < xE; x += 6) {
            const i = (y * w + x) * 4;
            totalDiff += Math.abs(d1[i] - d2[i]) + Math.abs(d1[i + 1] - d2[i + 1]) + Math.abs(d1[i + 2] - d2[i + 2]);
            count++;
          }
        }
        return count > 0 ? totalDiff / (count * 3 * 255) : 0;
      };

      const computeFrameStats = (imageData) => {
        const data = imageData.data;
        const pixels = data.length / 4;
        let brightnessSum = 0, brightnessSqSum = 0, saturationSum = 0, edgeScore = 0, warmPixelCount = 0, skinPixelCount = 0;
        const width = imageData.width, skip = 4 * 20;
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i + 1], b = data[i + 2];
          const brightness = 0.2126 * r + 0.7152 * g + 0.0722 * b;
          brightnessSum += brightness; brightnessSqSum += brightness * brightness;
          const maxVal = Math.max(r, g, b), minVal = Math.min(r, g, b);
          saturationSum += maxVal === 0 ? 0 : (maxVal - minVal) / maxVal;
          if ((r > 160 && r > b * 1.4) || (g > 160 && g > b * 1.4)) warmPixelCount++;
          // 피부색 감지 (다양한 피부톤 커버: 밝은~어두운 톤)
          if (r > 60 && g > 30 && b > 15 &&
              r > g && r > b &&
              r - b > 15 &&
              Math.abs(r - g) < 80 &&
              r < 250) skinPixelCount++;
        }
        for (let i = 0; i < data.length - 4 * width; i += skip) {
          const diff = Math.abs(data[i] - data[i + 4]) + Math.abs(data[i] - data[i + width * 4]);
          if (diff > 80) edgeScore++;
        }
        const h = imageData.height;
        const xS = Math.floor(width * 0.25), xE = Math.floor(width * 0.75);
        const yS = Math.floor(h * 0.25), yE = Math.floor(h * 0.75);
        let lapSum = 0, lapCount = 0;
        let centerEdgeCount = 0, centerPixelCount = 0;
        for (let y = yS + 1; y < yE - 1; y += 5) {
          for (let x = xS + 1; x < xE - 1; x += 5) {
            const ci = (y * width + x) * 4;
            lapSum += Math.abs(data[ci] * 4 - data[((y - 1) * width + x) * 4] - data[((y + 1) * width + x) * 4] - data[(y * width + (x - 1)) * 4] - data[(y * width + (x + 1)) * 4]);
            lapCount++;
            // 중앙 영역 엣지 밀도: 수평/수직 픽셀 차이가 큰 곳 카운트
            const diffH = Math.abs(data[ci] - data[(y * width + (x + 1)) * 4]);
            const diffV = Math.abs(data[ci] - data[((y + 1) * width + x) * 4]);
            if (diffH > 30 || diffV > 30) centerEdgeCount++;
            centerPixelCount++;
          }
        }
        const avgBrightness = brightnessSum / pixels / 255;
        const variance = brightnessSqSum / pixels - Math.pow(brightnessSum / pixels, 2);
        const contrast = Math.sqrt(Math.max(variance, 0)) / 255;
        return {
          brightness: avgBrightness, contrast, saturation: saturationSum / pixels,
          edgeDensity: edgeScore / (pixels / skip),
          sharpness: lapCount > 0 ? Math.min(1, lapSum / lapCount / 60) : 0,
          warmRatio: Math.min(1, warmPixelCount / pixels * 6),
          centerEdgeDensity: centerPixelCount > 0 ? centerEdgeCount / centerPixelCount : 0,
          skinRatio: skinPixelCount / pixels,
        };
      };

      const computeSharpness = (imageData) => {
        const { data, width, height } = imageData;
        const xS = Math.floor(width * 0.25), xE = Math.floor(width * 0.75);
        const yS = Math.floor(height * 0.25), yE = Math.floor(height * 0.75);
        let lapSum = 0, lapCount = 0;
        for (let y = yS + 1; y < yE - 1; y += 4) {
          for (let x = xS + 1; x < xE - 1; x += 4) {
            const i = (y * width + x) * 4;
            lapSum += Math.abs(data[i] * 4 - data[((y - 1) * width + x) * 4] - data[((y + 1) * width + x) * 4] - data[(y * width + (x - 1)) * 4] - data[(y * width + (x + 1)) * 4]);
            lapCount++;
          }
        }
        return lapCount > 0 ? lapSum / lapCount : 0;
      };

      const isCelebrityMode = (ct) => ct === 'celebrity_solo' || ct === 'celebrity_group';

      const heuristicScore = (stats, ct) => {
        if (!stats) return 0;
        let score = 0;
        score += (1 - Math.min(1, Math.abs(stats.brightness - 0.6) * 2)) * 20;
        score += stats.contrast * 20;
        score += stats.saturation * 15;
        score += Math.min(1, stats.edgeDensity * 3) * 10;
        // 전 모드 공통: 기본 선명도 가중치 — 블러/흔들 컷 1차 필터
        score += Math.min(1, (stats.sharpness || 0) * 2) * 10;
        // 움직임(액션성): 과도한 움직임은 카메라 흔들림/블러 → 구간별 처리
        const delta = stats.actionDelta || 0;
        if (delta <= 0.2) {
          score += delta * 5 * 18;                     // 0~0.2: 선형 증가 (최대 18점)
        } else {
          score += 18 - Math.min(18, (delta - 0.2) * 60); // 0.2 초과: 빠르게 감점
        }
        if (isCelebrityMode(ct)) {
          // 셀럽: 흑백·쿨톤·무채색 조명 컷 불이익 제거
          // 채도·warmRatio 가중치 최소화, 선명도·중앙엣지 중심으로
          score -= stats.saturation * 15;        // 기본 채도 점수 제거
          score -= Math.min(1, (stats.warmRatio || 0) * 3) * 8; // 기본 warmRatio 제거
          score += Math.min(1, (stats.sharpness || 0) * 2) * 25;       // 선명도 (포커스 맞은 인물)
          score += Math.min(1, (stats.centerEdgeDensity || 0) * 4) * 20; // 중앙 윤곽선 (인물 존재)
          score += Math.min(1, (stats.contrast || 0) * 2) * 10;         // 대비 (흑백도 대비 있음)
          score += Math.min(1, (stats.warmRatio || 0) * 3) * 5;         // warmRatio 보조만
        } else {
          score += Math.min(1, (stats.warmRatio || 0) * 3) * 8;
        }
        return score;
      };

      // 인게임+시네마틱 전용 프리필터: 어두운 시네마틱 컷 + 인물 클로즈업 우대
      const heuristicScoreGameplayCinematic = (stats) => {
        if (!stats) return 0;
        let score = 0;
        // 밝기: 넓은 범위 허용 (0.15~0.8 모두 인정, 어두운 시네마틱 컷 포함)
        score += (1 - Math.min(1, Math.abs(stats.brightness - 0.5) * 1.5)) * 12;
        // 대비: 시네마틱 드라마틱 조명 우대 → 가장 높은 가중치
        score += stats.contrast * 30;
        // 채도: 낮아도 허용 (쿨톤·모노톤 시네마틱)
        score += stats.saturation * 6;
        // 전체 엣지 밀도
        score += Math.min(1, stats.edgeDensity * 3) * 10;
        // 선명도: 시네마틱 컷 핵심 지표
        score += Math.min(1, (stats.sharpness || 0) * 2) * 18;
        // 중앙 엣지 밀도: 캐릭터가 화면 중앙에 크게 있을수록 높음 → 클로즈업 보너스
        score += Math.min(1, (stats.centerEdgeDensity || 0) * 2) * 15;
        // 피부 감지: 인물 얼굴·신체 클로즈업 보너스
        score += Math.min(1, (stats.skinRatio || 0) * 20) * 12;
        // 움직임: 정적일수록 보너스 (시네마틱 정지 컷 우대)
        const delta = stats.actionDelta || 0;
        score += (1 - Math.min(1, delta * 4)) * 7;
        return score;
      };

      // 블러/흔들림 판별: 모션블러(움직임 많은데 선명도 낮음) 또는 전반적 아웃포커스
      const isBlurryFrame = (stats) => {
        if (!stats) return false;
        const sharpness = stats.sharpness || 0;
        const edgeDensity = stats.edgeDensity || 0;
        const actionDelta = stats.actionDelta || 0;
        // 카메라 흔들림/모션블러: 움직임 크고 선명도 낮음 (기준 강화)
        if (actionDelta > 0.12 && sharpness < 0.15) return true;
        // 전반적 흐림: 엣지도 선명도도 둘 다 낮음 (기준 강화)
        if (sharpness < 0.07 && edgeDensity < 0.05) return true;
        return false;
      };

      const applyPrefilter = (frames, analyzeCount, ct) => {
        if (!frames.length) return [];

        // ① 텍스트 전용 컷 하드 제거 (타이틀 카드·로고·엔딩 카드 등 — 배경색 무관)
        const noBlackText = frames.filter((f) => {
          const feat = f.geminiFeatures;
          if (!feat) return true;
          const textOverlay = feat.composition?.text_overlay;
          const charSize = feat.visual_features?.character_size;
          const charVis = feat.visual_features?.character_visibility;
          const depthLayers = feat.composition?.depth_layers;
          const noChar = charSize === 'none' || charVis === 'none';
          // heavy 텍스트 + 인물 없음 → 제거
          if (textOverlay === 'heavy' && noChar) return false;
          // minimal 텍스트 + 인물 없음 + 평면 배경 → 타이틀 카드로 간주, 제거
          if (textOverlay === 'minimal' && noChar && depthLayers === 'flat') return false;
          // 텍스트 없어도: 인물 없음 + 평면 배경 + 여백 많음 → 검정 로고화면·빈 화면, 제거
          const negativeSpace = feat.composition?.negative_space_available;
          if (noChar && depthLayers === 'flat' && negativeSpace) return false;
          return true;
        });
        const pool0 = noBlackText.length >= Math.ceil(analyzeCount * 0.5) ? noBlackText : frames;

        // ② 블러 하드 차단 (남은 후보가 너무 적으면 원본 사용)
        const nonBlurry = pool0.filter((f) => !isBlurryFrame(f.stats));
        let pool = nonBlurry.length >= Math.ceil(analyzeCount * 0.6) ? nonBlurry : pool0;

        // ① -b 셀럽 모드: 피부색은 보너스 신호로만 사용 — 필터링 없음
        // (역광·실루엣·쿨톤 조명 등 좋은 컷도 skinRatio 낮을 수 있음)

        // ② 점수 내림차순 정렬
        const sorted = [...pool].sort((a, b) => (b.prefilterScore || 0) - (a.prefilterScore || 0));
        if (sorted.length <= analyzeCount) return sorted;

        // ③ heuristicScore 상위 N개 + 3.0s gap filter (중복 컷 제거)
        const minGap = 3.0;
        const gapPassed = [];
        for (const frame of sorted) {
          if (gapPassed.length >= analyzeCount) break;
          if (!gapPassed.some((f) => Math.abs(f.timestamp - frame.timestamp) < minGap)) {
            gapPassed.push(frame);
          }
        }
        // 부족하면 gap 기준 단계적으로 완화해서 보충 (2.0초 → 1.0초 순)
        for (const fallbackGap of [2.0, 1.0]) {
          if (gapPassed.length >= analyzeCount) break;
          const passedTs = new Set(gapPassed.map((f) => f.timestamp));
          for (const frame of sorted) {
            if (gapPassed.length >= analyzeCount) break;
            if (!passedTs.has(frame.timestamp) &&
                !gapPassed.some((f) => Math.abs(f.timestamp - frame.timestamp) < fallbackGap)) {
              gapPassed.push(frame);
              passedTs.add(frame.timestamp);
            }
          }
        }

        return gapPassed.sort((a, b) => (b.prefilterScore || 0) - (a.prefilterScore || 0));
      };

      const deduplicateFrames = (sortedFrames, minGap = 3.0) => {
        const kept = [];
        for (const frame of sortedFrames) {
          if (!kept.some((k) => Math.abs(k.timestamp - frame.timestamp) < minGap)) kept.push(frame);
        }
        return kept;
      };

      // ── 세그먼트 기반 중복 제거 ────────────────────────────────────────────
      // 프레임 타임라인을 targetCount 구간으로 등분 → 구간당 최고 점수 1컷만 선택
      // videoDuration 없을 때는 간격 기반 폴백 사용 (requestMoreFrames 등)
      const segmentDeduplicateFrames = (sortedFrames, targetCount = 12, videoDuration = null) => {
        if (sortedFrames.length === 0) return [];
        if (sortedFrames.length <= targetCount) return sortedFrames;

        if (videoDuration && videoDuration > 0) {
          // 실제 프레임 범위 기준으로 구간 설정 (10%~90% 트리밍 반영)
          const tsMin = sortedFrames.reduce((m, f) => Math.min(m, f.timestamp), Infinity);
          const tsMax = sortedFrames.reduce((m, f) => Math.max(m, f.timestamp), -Infinity);
          const range = tsMax - tsMin || videoDuration * 0.8;
          const segLen = range / targetCount;

          const picked = [];
          const usedIdx = new Set();

          // 각 구간에서 sortedFrames(점수 내림차순)의 첫 번째 = 최고 점수 프레임 선택
          for (let s = 0; s < targetCount; s++) {
            const lo = tsMin + s * segLen;
            const hi = tsMin + (s + 1) * segLen + 0.001; // 마지막 구간 경계 포함
            const hitIdx = sortedFrames.findIndex((f, i) => !usedIdx.has(i) && f.timestamp >= lo && f.timestamp < hi);
            if (hitIdx >= 0) {
              usedIdx.add(hitIdx);
              picked.push(sortedFrames[hitIdx]);
            }
          }

          // 빈 구간이 있으면 남은 프레임 중 점수 높은 것으로 채우기
          for (let i = 0; i < sortedFrames.length && picked.length < targetCount; i++) {
            if (!usedIdx.has(i)) picked.push(sortedFrames[i]);
          }

          // ── 2차 간격 필터: 같은 장면에서 연속 선택된 유사 컷 제거 ──────────
          // 점수 높은 것 우선으로 정렬 후, minGap 이내 중복 제거
          // minGap = 세그먼트 길이의 70% (최소 3초) → 같은 장면 연속 컷 차단
          const minGap = Math.max(3.0, segLen * 0.7);
          const gapPassed = [];
          for (const frame of picked.sort((a, b) => b.score - a.score)) {
            if (!gapPassed.some((f) => Math.abs(f.timestamp - frame.timestamp) < minGap)) {
              gapPassed.push(frame);
            }
          }
          // 간격 필터로 부족해진 자리는 미사용 프레임에서 보충
          const passedTs = new Set(gapPassed.map((f) => f.timestamp));
          for (const frame of sortedFrames) {
            if (gapPassed.length >= targetCount) break;
            if (!passedTs.has(frame.timestamp) &&
                !gapPassed.some((f) => Math.abs(f.timestamp - frame.timestamp) < minGap)) {
              gapPassed.push(frame);
              passedTs.add(frame.timestamp);
            }
          }

          return gapPassed.sort((a, b) => b.score - a.score);
        }

        // 폴백: 간격 기반 (duration 모를 때)
        for (const gap of [5.0, 3.0, 2.0, 1.5, 1.0, 0.5, 0]) {
          const result = gap === 0 ? [...sortedFrames] : deduplicateFrames(sortedFrames, gap);
          if (result.length >= targetCount) return result;
        }
        return sortedFrames;
      };

      const buildTimestamps = (duration, totalSamples) => {
        if (!duration || totalSamples <= 0) return [];
        const startOffset = 0, endOffset = duration * 0.90;
        const effectiveDuration = endOffset - startOffset;
        const timestamps = [];
        for (let i = 0; i < totalSamples; i++) {
          const base = startOffset + ((i + 0.5) / totalSamples) * effectiveDuration;
          const jitter = Math.random() * Math.min(1, effectiveDuration / totalSamples);
          timestamps.push(Math.min(endOffset, Math.max(startOffset, base + jitter - 0.5)));
        }
        return timestamps.sort((a, b) => a - b);
      };

      // ── 적응형 타임스탬프 생성 (컷 밀도 기반 간격) ────────────────────────────
      const buildTimestampsAdaptive = (duration, interval) => {
        if (!duration || interval <= 0) return [];
        const startOffset = duration * 0.1, endOffset = duration * 0.9;
        const timestamps = [];
        for (let t = startOffset; t < endOffset; t += interval) {
          // 간격의 절반 이내 랜덤 지터 추가 (같은 장면 중복 방지)
          const jitter = (Math.random() - 0.5) * interval * 0.4;
          const ts = Math.min(endOffset - 0.05, Math.max(startOffset, t + jitter));
          timestamps.push(parseFloat(ts.toFixed(3)));
        }
        return timestamps.sort((a, b) => a - b);
      };

      // ── Gemini 분석 (콘텐츠 유형별 프롬프트 동적 적용 + 자연어 컨텍스트 + 영상 요약) ───
      const analyzeWithGemini = async (base64, ct, videoContext = null) => {
        if (isMockKey(geminiApiKey)) {
          await delay(80);
          // userContext가 입력됐을 때만 user_intent_match를, 영상 요약이 있을 때만 content_fit을 채워 실제 동작과 일치시킴
          return mockFeatures(String(base64).slice(0, 80), { withUserIntent: !!(userContext && userContext.trim()), withContentFit: !!videoContext });
        }
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`;
        let prompt = getGeminiAnalysisPrompt(ct || contentType, videoContext);
        if (userContext && userContext.trim()) {
          prompt = `═══════════════════════════════════════════════\n🔥 사용자 자연어 지시 (HIGHEST PRIORITY) 🔥\n═══════════════════════════════════════════════\n사용자가 직접 입력한 영상 컨셉/강조 포인트:\n\n"${userContext.trim()}"\n\n⚠️ 출력 JSON의 "content" 객체 안에 반드시 아래 필드를 추가하세요:\n   "user_intent_match": <0.0 ~ 1.0 사이의 소수>\n\n이 필드는 현재 프레임이 위 사용자 지시와 얼마나 일치하는지의 점수입니다:\n  - 1.0  : 사용자 지시에 완벽히 부합 (강조한 주제·요소·인물·분위기·연출이 모두 분명히 드러남)\n  - 0.8  : 대부분 부합 (핵심 의도가 명확히 드러남)\n  - 0.5  : 일부만 부합\n  - 0.2  : 거의 무관\n  - 0.0  : 사용자 지시와 완전히 무관하거나 반대\n\n⚠️ 사용자가 명시한 주제·인물·아이템·장면·분위기가 화면에서 명확히 보이지 않으면 user_intent_match를 0.3 이하로 매우 낮게 매기세요.\n⚠️ 이 필드는 최종 점수의 결정적 가중치로 사용되니 보수적이고 정확하게 평가하세요.\n═══════════════════════════════════════════════\n\n[보조 분석 기준 — 위 지시와 별개로 모든 카테고리 필드도 정상 출력]\n\n` + prompt;
        }
        const body = JSON.stringify({
          contents: [{ parts: [
            { text: prompt },
            { inline_data: { mime_type: 'image/jpeg', data: base64 } }
          ]}],
        });
        const signal = abortControllerRef.current?.signal || null;
        const response = await fetchWithGeminiRetry(apiUrl, body, 5, signal);
        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('JSON 형식 없음');
        return JSON.parse(jsonMatch[0]);
      };

      // ── Fine sampling: 특정 타임스탬프 주변에서 가장 선명한 프레임 ─────────
      // Electron: FFmpeg 배치 추출 / 웹: Canvas seek 방식
      const extractFineSamplesAround = async (targetTs, duration, videoSourceForWeb) => {
        const clampedTs = parseFloat(Math.min(Math.max(targetTs, 0), duration - 0.1).toFixed(2));

        // Gemini가 이미 최적 타임스탬프를 선정했으므로 해당 지점 1프레임만 추출
        // (주변 탐색은 컨텍스트 프리뷰에서 사용자가 직접 수행)
        if (isElectron) {
          const extracted = await eAPI.extractFramesBatch(videoPath, [clampedTs]);
          const item = extracted?.[0];
          if (!item?.success || !item.base64) return null;
          return { timestamp: item.timestamp, dataUrl: item.base64, base64: item.base64.split(',')[1] };
        } else {
          // 웹 폴백: Canvas seek
          const { video, canvas, ctx } = videoSourceForWeb;
          video.currentTime = clampedTs;
          await new Promise((r) => (video.onseeked = r));
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
          return { timestamp: clampedTs, dataUrl, base64: dataUrl.split(',')[1] };
        }
      };

      // ── 주변 프레임 미리보기 ────────────────────────────────────────────────
      // 처음 열 때 ±PRELOAD_RANGE_S 전체를 한 번에 추출 → 이후 이동은 캐시에서 즉시
      const PRELOAD_RANGE_S = 5.0; // ±5초 = 최대 100프레임 사전 추출

      const preloadContextFrames = async (center, videoDuration, sourceVideoPath) => {
        const start = Math.max(0, center - PRELOAD_RANGE_S);
        const end = Math.min(videoDuration - 0.1, center + PRELOAD_RANGE_S);
        const timestamps = [];
        for (let t = start; t <= end + 0.01; t += CONTEXT_INTERVAL)
          timestamps.push(parseFloat(Math.min(end, Math.max(0, t)).toFixed(2)));

        if (isElectron) {
          // 구간 연속 디코드 1회 (개별 타임스탬프 seek ~100회 대비 수 배 빠름)
          const fps = Math.round(1 / CONTEXT_INTERVAL);
          const extracted = await eAPI.extractSegment(sourceVideoPath || videoPath, start, end - start, fps);
          return extracted.filter((e) => e.success).map((e) => ({ timestamp: e.timestamp, dataUrl: e.base64 }));
        } else if (videoFile) {
          const video = document.createElement('video');
          video.src = URL.createObjectURL(videoFile);
          await new Promise((r, j) => { video.onloadedmetadata = r; video.onerror = j; });
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth || 1280; canvas.height = video.videoHeight || 720;
          const ctx = canvas.getContext('2d');
          const frames = [];
          for (const t of timestamps) {
            video.currentTime = t;
            await new Promise((r) => (video.onseeked = r));
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            frames.push({ timestamp: t, dataUrl: canvas.toDataURL('image/jpeg', 0.85) });
          }
          URL.revokeObjectURL(video.src);
          return frames;
        }
        return [];
      };

      // 캐시에서 center 기준 CONTEXT_FRAMES장 즉시 반환
      const getDisplayFromCache = (center, preloaded) => {
        if (!preloaded.length) return [];
        const sorted = [...preloaded].sort((a, b) => a.timestamp - b.timestamp);
        let closestIdx = 0, minDist = Infinity;
        sorted.forEach((f, i) => { const d = Math.abs(f.timestamp - center); if (d < minDist) { minDist = d; closestIdx = i; } });
        const half = Math.floor(CONTEXT_FRAMES / 2);
        const s = Math.max(0, Math.min(closestIdx - half, sorted.length - CONTEXT_FRAMES));
        return sorted.slice(s, s + CONTEXT_FRAMES);
      };

      const handleContextPreview = async (frame, histVideoPath) => {
        // histVideoPath: 히스토리에서 호출 시 원본 영상 경로 (없으면 현재 로드된 videoPath 사용)
        const srcPath = histVideoPath || videoPath;
        const knownDuration = cachedVideoDuration;
        setContextPreview({ open: true, loading: true, baseTimestamp: frame.timestamp, windowCenter: frame.timestamp, videoDuration: knownDuration, preloadedFrames: [], frames: [], error: '' });
        try {
          let videoDuration = knownDuration;
          if (!videoDuration) {
            if (isElectron) { const meta = await eAPI.ffprobeVideo(srcPath); videoDuration = meta.duration; }
            else if (videoFile) {
              const video = document.createElement('video');
              video.src = URL.createObjectURL(videoFile);
              await new Promise((r, j) => { video.onloadedmetadata = r; video.onerror = j; });
              videoDuration = video.duration;
              URL.revokeObjectURL(video.src);
            }
          }
          // 같은 영상의 인접 구간(±0.5초)을 다시 열면 추출 없이 캐시에서 즉시 표시
          const cacheKey = `${srcPath}|${Math.round(frame.timestamp)}`;
          let preloaded = contextCacheRef.current.get(cacheKey);
          if (!preloaded || preloaded.length === 0) {
            preloaded = await preloadContextFrames(frame.timestamp, videoDuration, srcPath);
            contextCacheRef.current.set(cacheKey, preloaded);
            // 1280px 프레임 ~100장/구간이라 메모리 고려해 4구간만 유지
            if (contextCacheRef.current.size > 4) {
              const oldest = contextCacheRef.current.keys().next().value;
              contextCacheRef.current.delete(oldest);
            }
          }
          const frames = getDisplayFromCache(frame.timestamp, preloaded);
          setContextPreview((prev) => ({ ...prev, loading: false, videoDuration, preloadedFrames: preloaded, frames }));
        } catch (err) {
          setContextPreview((prev) => ({ ...prev, loading: false, error: err.message }));
        }
      };

      // 캐시 기반 즉시 이동 (FFmpeg 호출 없음)
      const navigateToTimestamp = (ts) => {
        const clamped = Math.max(0, Math.min(contextPreview.videoDuration || ts, ts));
        const frames = getDisplayFromCache(clamped, contextPreview.preloadedFrames);
        setContextPreview((prev) => ({ ...prev, windowCenter: clamped, frames }));
      };

      const shiftContextWindow = (direction) => {
        const shift = direction * CONTEXT_FRAMES * CONTEXT_INTERVAL;
        const newCenter = Math.max(0, Math.min(contextPreview.videoDuration || 0, contextPreview.windowCenter + shift));
        navigateToTimestamp(newCenter);
      };

      // 타임라인 범위: 사전 추출된 프레임 전체 범위 사용
      const getLocalTimelineRange = () => {
        const pl = contextPreview.preloadedFrames;
        if (pl && pl.length > 0) {
          return { start: pl[0].timestamp, end: pl[pl.length - 1].timestamp };
        }
        const center = contextPreview.windowCenter ?? contextPreview.baseTimestamp ?? 0;
        return { start: Math.max(0, center - PRELOAD_RANGE_S), end: center + PRELOAD_RANGE_S };
      };

      // 타임라인 바에서 마우스 위치 → 타임스탬프 변환
      const getTsFromMouseX = (clientX) => {
        const bar = timelineBarRef.current;
        if (!bar) return null;
        const rect = bar.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        const { start, end } = getLocalTimelineRange();
        return start + ratio * (end - start);
      };

      const handleTimelineMouseDown = (e) => {
        timelineDragRef.current.active = true;
        const ts = getTsFromMouseX(e.clientX);
        if (ts !== null) { timelineDragRef.current.previewTs = ts; setTimelinePreviewTs(ts); }
      };
      const handleTimelineMouseMove = (e) => {
        if (!timelineDragRef.current.active) return;
        const ts = getTsFromMouseX(e.clientX);
        if (ts !== null) { timelineDragRef.current.previewTs = ts; setTimelinePreviewTs(ts); }
      };
      const handleTimelineMouseUp = (e) => {
        if (!timelineDragRef.current.active) return;
        timelineDragRef.current.active = false;
        const ts = timelineDragRef.current.previewTs ?? getTsFromMouseX(e.clientX);
        setTimelinePreviewTs(null);
        if (ts !== null) navigateToTimestamp(ts);
      };

      // ── 이미지 저장 ────────────────────────────────────────────────────────
      const saveImage = async (dataUrl, defaultName) => {
        if (isElectron) {
          const filePath = await eAPI.saveImageDialog(defaultName);
          if (filePath) await eAPI.saveImageFile(filePath, dataUrl);
        } else {
          const a = document.createElement('a');
          a.href = dataUrl; a.download = defaultName; a.click();
        }
      };

      // ── 인간 검토 단계: Promise로 분석 흐름을 일시 정지하고 사용자 선택 대기 ──
      const awaitHumanReview = (frames, label) => {
        return new Promise((resolve) => {
          setReviewState({
            active: true,
            frames,
            selectedIdx: new Set(frames.map((_, i) => i)), // 전체 기본 선택
            resolve,
            label: label || `${frames.length}개 후보 프레임`,
          });
        });
      };

      const confirmReview = () => {
        setReviewState((prev) => {
          const selected = prev.frames.filter((_, i) => prev.selectedIdx.has(i));
          const deselected = prev.frames.filter((_, i) => !prev.selectedIdx.has(i));
          // 제외된 컷을 풀로 반환 (prefilterScore 내림차순 유지)
          if (deselected.length > 0) {
            setFramePool((pool) =>
              [...deselected, ...pool].sort((a, b) => (b.prefilterScore || 0) - (a.prefilterScore || 0))
            );
          }
          if (prev.resolve) prev.resolve(selected);
          return { active: false, frames: [], selectedIdx: new Set(), resolve: null, label: '' };
        });
      };

      // X 버튼: 모든 프레임을 풀로 돌려보내고 분석 취소 (null 반환)
      const cancelReview = () => {
        setReviewState((prev) => {
          if (prev.frames.length > 0) {
            setFramePool((pool) =>
              [...prev.frames, ...pool].sort((a, b) => (b.prefilterScore || 0) - (a.prefilterScore || 0))
            );
          }
          if (prev.resolve) prev.resolve(null); // null = 취소 신호
          return { active: false, frames: [], selectedIdx: new Set(), resolve: null, label: '' };
        });
      };

      const toggleReviewFrame = (idx) => {
        setReviewState((prev) => {
          const next = new Set(prev.selectedIdx);
          if (next.has(idx)) next.delete(idx); else next.add(idx);
          return { ...prev, selectedIdx: next };
        });
      };

      const toggleAllReview = (selectAll) => {
        setReviewState((prev) => ({
          ...prev,
          selectedIdx: selectAll ? new Set(prev.frames.map((_, i) => i)) : new Set(),
        }));
      };

      // ── 추가 컷 요청: 이미 분석된 풀 우선 재사용 → 없으면 미분석 풀에서 N컷 ──
