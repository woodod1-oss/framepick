      const requestMoreFrames = async (count = 10) => {
        // 1) 이미 분석된 all 풀에서 현재 top에 노출되지 않은 컷을 우선 재활용
        const allAnalyzed = extractedFrames?.all || [];
        const topTimestamps = new Set((extractedFrames?.top || []).map((f) => f.timestamp));
        const unseenAnalyzed = allAnalyzed.filter((f) => !topTimestamps.has(f.timestamp));
        if (unseenAnalyzed.length > 0) {
          // 분석 비용 없이 dedup만 다시 적용해 새 top 구성
          setExtractedFrames((prev) => {
            const merged = [...(prev?.top || []), ...unseenAnalyzed.slice(0, count)]
              .sort((a, b) => b.score - a.score);
            const deduped = segmentDeduplicateFrames(merged, (prev?.top?.length || 12) + count, null);
            return { top: deduped.slice(0, (prev?.top?.length || 12) + count), all: prev?.all || [] };
          });
          setProgress({ current: 1, total: 1, msg: `분석 완료된 ${Math.min(count, unseenAnalyzed.length)}컷을 추가 노출` });
          return;
        }

        // 2) 풀이 비어 있으면 안내
        if (framePool.length === 0) { alert('추가 후보 프레임이 없습니다 (풀이 비어있음)'); return; }
        const nextBatch = framePool.slice(0, count);
        setFramePool((pool) => pool.slice(count)); // 꺼낸 만큼 풀에서 제거

        // 검토 모달
        const selected = await awaitHumanReview(
          nextBatch,
          `추가 후보 ${nextBatch.length}컷 — 분석할 컷을 선택하세요 (풀 잔여 ${framePool.length - count}개)`
        );
        if (!selected || selected.length === 0) return; // null = X 버튼으로 취소

        // 분석
        setLoading(true);
        setProgress({ current: 1, total: 2, msg: `추가 ${selected.length}컷 병렬 분석 중...` });
        try {
          const additional = await parallelMap(
            selected,
            async (frame) => {
              const features = await analyzeWithGemini(frame.base64, effectiveContentType);
              const score = scoreFrame(features, rules, effectiveContentType);
              const reasons = getReasons(features, rules);
              return { ...frame, features, score, reasons };
            },
            GEMINI_CONCURRENCY,
            (done, total) => setProgress({ current: 1, total: 2, msg: `추가 분석 ${done}/${total} 완료` })
          );

          // 기존 결과와 병합 후 재정렬 (50점 이하 추가 컷은 제외)
          setExtractedFrames((prev) => {
            const extraValid = additional.filter((f) => typeof f.score === 'number' && f.score > 50);
            const mergedAll = [...(prev?.all || []), ...extraValid].sort((a, b) => b.score - a.score);
            const deduped = segmentDeduplicateFrames(mergedAll, 12, null);
            return { top: deduped.slice(0, 12), all: mergedAll };
          });
          setProgress({ current: 2, total: 2, msg: `추가 분석 완료! ${additional.length}컷 병합됨` });
        } finally {
          setLoading(false);
        }
      };

      // ── 메인 추출 로직 ──────────────────────────────────────────────────────
      const extractThumbnails = async () => {
        if (!hasVideo || !geminiApiKey) { alert('영상과 API 키가 필요합니다'); return; }
        // 새 분석 시작: 기존 AbortController가 있다면 중단하고 새로 생성
        if (abortControllerRef.current) abortControllerRef.current.abort();
        abortControllerRef.current = new AbortController();
        setLoading(true);

        // ── Video-AI 모드 ────────────────────────────────────────────────────
        if (scanMode === 'video_ai') {
          let compressedTempPath = null; // 압축 임시 파일 경로 (정리용)
          try {
            // ── Electron: 파일 크기 확인 후 필요 시 자동 압축 (2GB 제한) ──────
            let videoSource = isElectron ? videoPath : videoFile;
            if (isElectron) {
              setProgress({ current: 1, total: 6, msg: '파일 크기 확인 중...' });
              eAPI.onCompressProgress((data) => {
                setProgress({ current: 1, total: 6, msg: `영상 압축 중 ${data.percent}% (파일이 2GB를 초과해 자동 압축합니다)...` });
              });
              const result = await eAPI.compressVideoForUpload(videoPath);
              eAPI.offCompressProgress();
              if (result.compressed) {
                compressedTempPath = result.path;
                const origGB = (result.originalSize / 1024 / 1024 / 1024).toFixed(1);
                const compGB = (result.compressedSize / 1024 / 1024 / 1024).toFixed(1);
                setProgress({ current: 1, total: 6, msg: `압축 완료 (${origGB}GB → ${compGB}GB), 업로드 중...` });
                videoSource = result.path;
              }
            }

            setProgress({ current: 1, total: 6, msg: '영상 업로드 중 (Gemini File API)...' });
            let lastUploadPercent = 0;
            const uploadedFile = await uploadVideoToGemini(videoSource, geminiApiKey, (p) => {
              const pct = Math.round(p * 100);
              // p === 0 이고 이전 진행률이 있었으면 재시도 신호
              if (p === 0 && lastUploadPercent > 0) {
                setProgress({ current: 1, total: 6, msg: 'Gemini 서버 일시 오류 — 자동 재시도 중...' });
              } else {
                setProgress({ current: 1, total: 6, msg: `업로드 ${pct}%...` });
              }
              lastUploadPercent = pct;
            });

            setProgress({ current: 2, total: 6, msg: 'Gemini 영상 처리 대기 중...' });
            const activeFile = await waitForFileActive(uploadedFile.name, geminiApiKey);
            // ACTIVE 직후 Gemini 인덱싱이 완전히 안정화될 시간을 잠시 확보
            // (실패 시 selectTimestampsFromVideo의 3회 재시도가 안전망)
            await new Promise((r) => setTimeout(r, 1000));

            // 영상 길이를 Gemini 호출 전에 먼저 확보 (구간별 분산 프롬프트에 사용)
            let duration;
            if (cachedVideoDuration) {
              duration = cachedVideoDuration;
            } else if (isElectron) {
              const meta = await eAPI.ffprobeVideo(videoPath);
              duration = meta.duration;
            } else {
              const video = document.createElement('video');
              video.src = URL.createObjectURL(videoFile);
              await new Promise((r, j) => { video.onloadedmetadata = r; video.onerror = j; });
              duration = video.duration;
              URL.revokeObjectURL(video.src);
            }
            setCachedVideoDuration(duration);

            // ── 타임스탬프 추천 + 영상 요약(content) 확보 (최대 3회 재시도) ──
            const isCelebMode = isCelebrityMode(effectiveContentType);
            const MIN_GAP_S = 2.0; // 모드 무관 고정 2초 간격 (팀원 버전 정책 반영)
            const MIN_RECS = isCelebMode ? 5 : 3;
            const trailingCutoff = duration * 0.90;
            let videoContext = null;
            let recommendations = [];
            let attempt = 0;
            const MAX_ATTEMPTS = 3;
            while (attempt < MAX_ATTEMPTS) {
              attempt++;
              setProgress({ current: 3, total: 6, msg: `AI가 영상 전체를 보며 핵심 구간 선정 중... (시도 ${attempt}/${MAX_ATTEMPTS})` });
              const result = await selectTimestampsFromVideo(activeFile.uri, geminiApiKey, effectiveContentType, duration, userContext, abortControllerRef.current?.signal);
              const rawRecommendations = result?.timestamps || [];
              if (result?.videoContext) videoContext = result.videoContext;
              if (!rawRecommendations || rawRecommendations.length === 0) {
                if (attempt < MAX_ATTEMPTS) { await new Promise((r) => setTimeout(r, 1500)); continue; }
                throw new Error('AI 구간 추천 결과 없음');
              }
              // 코드 레벨 중복 제거: 고정 간격 필터 + 후반 10% 제거
              const sortedRecs = [...rawRecommendations]
                .filter((rec) => rec.timestamp <= trailingCutoff)
                .sort((a, b) => a.timestamp - b.timestamp);
              recommendations = sortedRecs.filter((rec, idx) => {
                if (idx === 0) return true;
                return rec.timestamp - sortedRecs[idx - 1].timestamp >= MIN_GAP_S;
              });
              if (recommendations.length >= MIN_RECS) break;
              if (attempt < MAX_ATTEMPTS) {
                setProgress({ current: 3, total: 6, msg: `구간이 ${recommendations.length}개로 부족 — 재시도 중 (${attempt}/${MAX_ATTEMPTS})` });
                await new Promise((r) => setTimeout(r, 1500));
              }
            }
            if (recommendations.length === 0) throw new Error('중복 제거 후 유효한 구간 없음');

            setProgress({ current: 4, total: 6, msg: `${recommendations.length}개 구간 정밀 프레임 추출 중 (FFmpeg)...` });
            // 웹 폴백용 비디오 준비
            let webVideoSrc = null;
            if (!isElectron) {
              webVideoSrc = document.createElement('video');
              webVideoSrc.src = URL.createObjectURL(videoFile);
              await new Promise((r, j) => { webVideoSrc.onloadedmetadata = r; webVideoSrc.onerror = j; });
              const canvas = document.createElement('canvas');
              canvas.width = webVideoSrc.videoWidth || 1280; canvas.height = webVideoSrc.videoHeight || 720;
              const ctx = canvas.getContext('2d');
              webVideoSrc = { video: webVideoSrc, canvas, ctx };
            }

            let sharpFrames = [];
            if (isElectron) {
              // 추천 구간 전체를 배치 IPC 한 번으로 추출 (개별 호출 대비 FFmpeg 병렬 활용)
              const tsList = recommendations.map((rec) => parseFloat(Math.min(Math.max(rec.timestamp, 0), duration - 0.1).toFixed(2)));
              const extracted = await eAPI.extractFramesBatch(videoPath, tsList);
              sharpFrames = extracted
                .map((item, i) => (item?.success && item.base64)
                  ? { timestamp: item.timestamp, dataUrl: item.base64, base64: item.base64.split(',')[1], aiReason: recommendations[i].reason }
                  : null)
                .filter(Boolean);
            } else {
              for (const rec of recommendations) {
                const frame = await extractFineSamplesAround(rec.timestamp, duration, webVideoSrc);
                if (frame) sharpFrames.push({ ...frame, aiReason: rec.reason });
              }
            }
            if (!isElectron && webVideoSrc) URL.revokeObjectURL(webVideoSrc.video.src);
            if (sharpFrames.length === 0) throw new Error('선명 프레임 추출 실패');

            // ── 인간 검토 단계: AI 추천 구간을 사용자가 최종 선별 ─────────────
            setLoading(false);
            const selectedFrames = await awaitHumanReview(sharpFrames, `AI 추천 ${sharpFrames.length}구간 — 분석할 컷을 선택하세요`);
            if (!selectedFrames) return; // X 버튼으로 취소 → 조용히 종료
            setLoading(true);
            if (selectedFrames.length === 0) throw new Error('선택된 프레임이 없습니다');

            setProgress({ current: 5, total: 6, msg: `${selectedFrames.length}개 프레임 병렬 정밀 분석 중 (${GEMINI_CONCURRENCY}개씩 동시)...` });
            const analyzed = await parallelMap(
              selectedFrames,
              async (frame) => {
                const features = await analyzeWithGemini(frame.base64, effectiveContentType, videoContext);
                const score = scoreFrame(features, rules, effectiveContentType);
                const reasons = getReasons(features, rules);
                // Gemini가 영상 전체 맥락에서 이 시점을 추천한 이유를 reasons 최상단에 표시
                if (frame.aiReason) reasons.unshift(`💡 AI 선정 이유: ${frame.aiReason}`);
                return { ...frame, features, score, reasons };
              },
              GEMINI_CONCURRENCY,
              (done, total) => {
                setProgress({ current: 5, total: 6, msg: `정밀 분석 ${done}/${total} 완료` });
              }
            );
            if (analyzed.length === 0) throw new Error('모든 프레임 분석 실패');
            const isCelebVideoAi = isCelebrityMode(effectiveContentType);
            const sorted = analyzed
              .filter((f) => typeof f.score === 'number')
              .filter((f) => f.score > 50) // 50점 이하 컷은 노출 제외
              .filter((f) => {
                // 셀럽 모드는 넓은 그룹샷·실루엣 등 charSize=none 유효 컷이 있으므로 제외
                if (isCelebVideoAi) return true;
                // 나머지 모드: 빈 화면 하드 차단 (인물 없음 + 평면 배경 = 타이틀·로고·엔딩 화면)
                const feat = f.features;
                if (!feat) return true;
                const charSize = feat.visual_features?.character_size;
                const depthLayers = feat.composition?.depth_layers;
                if (charSize === 'none' && depthLayers === 'flat') return false;
                return true;
              })
              .sort((a, b) => b.score - a.score);
            const videoAiOutputCount = effectiveContentType === 'celebrity_group' ? 30 : effectiveContentType === 'celebrity_solo' ? 20 : 12;
            const deduped = segmentDeduplicateFrames(sorted, videoAiOutputCount, duration);
            // top은 dedup, all은 분석된 모든 컷의 raw sorted (requestMoreFrames에서 재사용)
            setExtractedFrames({ top: deduped.slice(0, videoAiOutputCount), all: sorted });
            addToHistory(deduped.slice(0, videoAiOutputCount), effectiveContentType, scanMode, videoName);
            setProgress({ current: 6, total: 6, msg: '완료! (Video-AI 모드)' });
          } catch (err) {
            if (err?.name === 'AbortError') {
              setProgress({ current: 0, total: 0, msg: '사용자가 분석을 취소했습니다' });
            } else {
              // 503/UNAVAILABLE 등 일시적 서버 장애 시 친화적 안내
              const msg = err?.message || '';
              const isUnavailable = err?.status === 503 || msg.includes('503') || msg.includes('UNAVAILABLE');
              const isRateLimit = err?.status === 429 || msg.includes('429') || msg.includes('RESOURCE_EXHAUSTED');
              const isAuth = err?.status === 401 || err?.status === 403 || msg.includes('API key') || msg.includes('PERMISSION_DENIED');
              if (isUnavailable) {
                alert('Gemini 서버가 일시적으로 응답하지 않습니다 (503 UNAVAILABLE).\n자동 재시도까지 모두 실패했어요.\n\n• 잠시(1~3분) 기다린 뒤 다시 시도\n• 또는 콘텐츠 유형을 "모션그래픽"으로 바꿔 전수 스캔 모드 사용\n  (전수 스캔은 File API를 사용하지 않아 우회 가능)');
              } else if (isRateLimit) {
                alert('Gemini API 사용량 한도에 도달했습니다 (429).\n잠시 후 다시 시도하거나, Google AI Studio에서 할당량을 확인해 주세요.');
              } else if (isAuth) {
                alert('API 키 인증 오류입니다. 설정 탭에서 Gemini API 키를 다시 확인해 주세요.\n\n원본 오류: ' + msg);
              } else {
                alert('Video-AI 오류: ' + msg);
              }
            }
          } finally {
            setLoading(false);
            // 압축 임시 파일 정리
            if (compressedTempPath && isElectron) {
              eAPI.deleteTempFile(compressedTempPath).catch(() => {});
            }
          }
          return;
        }

        // ── 빠른 / 고급 모드 ─────────────────────────────────────────────────
        setProgress({ current: 0, total: 5, msg: '영상 정보 로딩...' });
        try {
          let duration;
          if (isElectron) {
            const meta = await eAPI.ffprobeVideo(videoPath);
            duration = meta.duration;
          } else {
            const video = document.createElement('video');
            video.src = URL.createObjectURL(videoFile);
            await new Promise((r, j) => { video.onloadedmetadata = r; video.onerror = j; });
            duration = video.duration;
            URL.revokeObjectURL(video.src);
          }
          setCachedVideoDuration(duration); // 주변 프레임 재사용용

          const config = getScanConfig(duration, effectiveContentType);
          const timestamps = buildTimestamps(duration, config.totalSamples);

          // ─── Electron: FFmpeg 배치 추출 (고속) ───────────────────────────
          let rawFrames = [];
          if (isElectron) {
            setProgress({ current: 1, total: 5, msg: `FFmpeg로 ${timestamps.length}컷 고속 추출 중...` });
            const extracted = await eAPI.extractFramesBatch(videoPath, timestamps);
            // 청크 단위 병렬 디코드 (다운스케일 해상도 — 통계는 비율 기반이라 충분, 메모리도 절약)
            // 모션 델타(prevImageData) 체인은 순서 보장을 위해 청크 내에서 순차 계산
            let prevImageData = null;
            const DECODE_CHUNK = 12;
            for (let c = 0; c < extracted.length; c += DECODE_CHUNK) {
              const chunk = extracted.slice(c, c + DECODE_CHUNK).filter((it) => it.success && it.base64);
              const decoded = await Promise.all(chunk.map((it) => decodeBase64ToImageData(it.base64, STATS_ANALYSIS_WIDTH).catch(() => null)));
              decoded.forEach((imageData, j) => {
                if (!imageData) return;
                const item = chunk[j];
                const actionDelta = computeFrameDelta(imageData, prevImageData);
                const stats = { ...computeFrameStats(imageData), actionDelta };
                prevImageData = imageData;
                rawFrames.push({ timestamp: item.timestamp, dataUrl: item.base64, base64: item.base64.split(',')[1], stats, prefilterScore: (effectiveContentType === 'gameplay_cinematic' || effectiveContentType === 'teasing_3d') ? heuristicScoreGameplayCinematic(stats) : heuristicScore(stats, effectiveContentType)});
              });
            }
          } else {
            // ─── 웹 폴백: Canvas seek ───────────────────────────────────────
            setProgress({ current: 1, total: 5, msg: `${timestamps.length}개 프레임 샘플링...` });
            const video = document.createElement('video');
            video.src = URL.createObjectURL(videoFile);
            await new Promise((r, j) => { video.onloadedmetadata = r; video.onerror = j; });
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280; canvas.height = video.videoHeight || 720;
            const ctx = canvas.getContext('2d');
            let prevImageData = null;
            for (let i = 0; i < timestamps.length; i++) {
              video.currentTime = Math.min(timestamps[i], duration - 0.1);
              await new Promise((r) => (video.onseeked = r));
              ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const actionDelta = computeFrameDelta(imageData, prevImageData);
              const stats = { ...computeFrameStats(imageData), actionDelta };
              prevImageData = imageData;
              const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
              rawFrames.push({ timestamp: timestamps[i], dataUrl, base64: dataUrl.split(',')[1], stats, prefilterScore: (effectiveContentType === 'gameplay_cinematic' || effectiveContentType === 'teasing_3d') ? heuristicScoreGameplayCinematic(stats) : heuristicScore(stats, effectiveContentType)});
            }
            URL.revokeObjectURL(video.src);
          }

          setProgress({ current: 2, total: 5, msg: `프리필터로 상위 ${config.analyzeCount}컷 선별 중...` });
          const prefiltered = applyPrefilter(rawFrames, config.analyzeCount, effectiveContentType);
          if (prefiltered.length === 0) throw new Error('프레임 추출 실패');

          // 프리필터에서 탈락한 나머지를 대기 풀에 보관 (추가 추천용)
          const prefilteredSet = new Set(prefiltered.map((f) => f.timestamp));
          const poolFrames = rawFrames
            .filter((f) => !prefilteredSet.has(f.timestamp))
            .sort((a, b) => (b.prefilterScore || 0) - (a.prefilterScore || 0));
          setFramePool(poolFrames);

          // ── 인간 검토 단계: 로딩 일시 정지 후 사용자 선택 대기 ──────────────
          setLoading(false); // 로딩 스피너 끄고 검토 UI 표시
          const filtered = await awaitHumanReview(prefiltered, `프리필터 후보 ${prefiltered.length}컷 — 분석할 컷을 선택하세요`);
          if (!filtered) return; // X 버튼으로 취소 → 조용히 종료
          setLoading(true);  // 선택 완료 후 다시 로딩 시작
          if (filtered.length === 0) throw new Error('선택된 프레임이 없습니다');

          setProgress({ current: 3, total: 5, msg: `Gemini ${filtered.length}컷 병렬 분석 시작 (${GEMINI_CONCURRENCY}개씩 동시)...` });
          const analyzed = await parallelMap(
            filtered,
            async (frame) => {
              const features = await analyzeWithGemini(frame.base64, effectiveContentType);
              const score = scoreFrame(features, rules, effectiveContentType);
              const reasons = getReasons(features, rules);
              return { ...frame, features, score, reasons };
            },
            GEMINI_CONCURRENCY,
            (done, total) => {
              setProgress({ current: 3, total: 5, msg: `Gemini 분석 ${done}/${total} 완료` });
            }
          );
          if (analyzed.length === 0) throw new Error('모든 프레임 분석 실패');
          const validFrames = analyzed
            .filter((f) => typeof f.score === 'number')
            .filter((f) => f.score > 50) // 50점 이하 컷은 노출 제외
            .filter((f) => {
              // 셀럽 모드는 그룹샷·실루엣 등 charSize=none 유효 컷 있으므로 제외
              if (isCelebrityMode(effectiveContentType)) return true;
              // 나머지 모드: 빈 화면 하드 차단 (인물 없음 + 평면 배경 = 타이틀·로고·엔딩 화면)
              const feat = f.features;
              if (!feat) return true;
              const charSize = feat.visual_features?.character_size;
              const depthLayers = feat.composition?.depth_layers;
              if (charSize === 'none' && depthLayers === 'flat') return false;
              return true;
            })
            .sort((a, b) => b.score - a.score);
          const dedupedFrames = segmentDeduplicateFrames(validFrames, 12, duration);
          // top은 dedup, all은 raw sorted (requestMoreFrames 재사용 풀)
          setExtractedFrames({ top: dedupedFrames.slice(0, 12), all: validFrames });
          addToHistory(dedupedFrames.slice(0, 12), effectiveContentType, scanMode, videoName);
          setProgress({ current: 5, total: 5, msg: '완료!' });
        } catch (err) {
          if (err?.name === 'AbortError') {
            setProgress({ current: 0, total: 0, msg: '사용자가 분석을 취소했습니다' });
          } else {
            alert('오류: ' + err.message);
          }
        } finally { setLoading(false); }
      };

      // ── 채점 공식 ─────────────────────────────────────────────────────────
      const scoreFrameBase = (features) => {
        const sceneType = features.content?.scene_type;
        const actionIntensity = features.visual_features?.action_intensity;
        const actionCat = typeof actionIntensity === 'number'
          ? (actionIntensity >= 0.7 ? 'high' : actionIntensity >= 0.4 ? 'medium' : 'low')
          : (actionIntensity || 'low');

        let catA = 28;
        if (sceneType === 'combat') catA += 14;
        else if (sceneType === 'victory') catA += 10;
        else if (sceneType === 'traversal') catA += 7;
        else if (sceneType === 'lobby') catA -= 16;
        if (actionCat === 'high') catA += 8;
        else if (actionCat === 'medium') catA += 3;
        else if (actionCat === 'low') catA -= 4;
        catA = Math.max(0, Math.min(50, catA));

        let catB = 0;
        const charSize = features.visual_features?.character_size;
        const charProminence = features.visual_features?.character_prominence;
        if (charSize === 'large') catB += 10;
        else if (charSize === 'medium') catB += 5;
        else if (charSize === 'small') catB += 0;
        else if (charSize === 'none') catB -= 15;  // 기본 패널티 강화 (-5 → -15)
        else if (typeof charProminence === 'number') {
          if (charProminence >= 0.4) catB += 10;
          else if (charProminence >= 0.3) catB += 5;
          else if (charProminence < 0.15) catB -= 5;
        }
        if (features.composition?.subject_isolation === 'single') catB += 8;
        else if (features.composition?.subject_isolation === 'few') catB += 2;
        else if (features.composition?.subject_isolation === 'crowded') catB -= 8;
        if (features.visual_features?.character_pose === 'dynamic') catB += 6;
        else if (features.visual_features?.character_pose === 'idle') catB -= 5;
        if (features.visual_features?.face_detected) catB += 2;
        catB = Math.max(-10, Math.min(20, catB));

        let catC = 0;
        if (features.composition?.rule_of_thirds) catC += 5;
        if (features.composition?.depth_layers === 'deep') catC += 6;
        else if (features.composition?.depth_layers === 'flat') catC -= 4;
        if (features.composition?.negative_space_available && charSize !== 'none') catC += 4;
        catC = Math.max(-5, Math.min(15, catC));

        const catD = actionCat === 'high' ? 10 : actionCat === 'medium' ? 5 : 0;

        let penalty = 0;
        const uiClutter = features.visual_features?.ui_clutter_level;
        const uiClutterScore = features.visual_features?.ui_clutter_score;
        if (uiClutter === 'high') penalty += 25;
        else if (uiClutter === 'low') penalty += 8;
        else if (typeof uiClutterScore === 'number') penalty += uiClutterScore * 22;
        if (sceneType === 'lobby') penalty += 15;
        if (features.content?.is_gameplay === false) penalty += 14;
        if (sceneType === 'combat') penalty = Math.max(0, penalty - 5);
        // 텍스트 오버레이 페널티 (타이틀·자막 등 편집 텍스트)
        const textOverlay = features.composition?.text_overlay;
        if (textOverlay === 'heavy') penalty += 30;
        else if (textOverlay === 'minimal') penalty += 5;
        penalty = Math.min(60, Math.max(0, penalty));

        return Math.min(100, Math.max(0, Math.round(catA + catB + catC + catD - penalty)));
      };

      // ── 콘텐츠 유형별 보너스 점수 (-50 ~ +55) ──────────────────────────────
      const scoreContentType = (features, ct) => {
        let bonus = 0;
        const vf = features.visual_features || {};
        const comp = features.composition || {};
        const cont = features.content || {};
        switch(ct) {
          case 'teasing': {
            const reveal = vf.subject_reveal;
            if (reveal === 'silhouette') bonus += 50;
            else if (reveal === 'partial') bonus += 30;
            else if (reveal === 'full') bonus -= 15;
            if (vf.action_intensity === 'high') bonus -= 8;
            if (cont.scene_type === 'combat') bonus -= 5;
            break;
          }
          case 'teasing_3d': {
            const reveal = vf.subject_reveal;
            // 실루엣/일부 공개 = 티징 최상위
            if (reveal === 'silhouette') bonus += 45;
            else if (reveal === 'partial') bonus += 28;
            else if (reveal === 'full') bonus -= 8;
            // UI 없고 깊이감 있는 3D 그래픽 연출 우대
            if (vf.ui_clutter_level === 'none') bonus += 20;
            if (comp.depth_layers === 'deep') bonus += 18;
            if (comp.rule_of_thirds) bonus += 12;
            if (cont.scene_type === 'cinematic') bonus += 15;
            if (comp.negative_space_available) bonus += 10;
            // 3D 그래픽 특성상 is_gameplay=false가 많음 → 패널티 없이 보너스
            if (cont.is_gameplay === false) bonus += 10;
            // character_size small/none도 3D 연출이면 감점 없음 (기본 teasing과 차별화)
            break;
          }
          case 'gameplay': {
            const hasLargeChar = vf.character_size === 'large';
            const hasMedChar   = vf.character_size === 'medium';
            const hasSmallChar = vf.character_size === 'small';
            const hasNoChar    = vf.character_size === 'none' || !vf.character_size;
            const hasChar      = hasLargeChar || hasMedChar;  // medium 이상만 "캐릭터 있음"으로 간주

            // ① subject_isolation: 캐릭터가 있을 때만 single 보너스
            if (comp.subject_isolation === 'single' && hasChar)      bonus += 28;
            else if (comp.subject_isolation === 'single' && hasSmallChar) bonus += 8;
            else if (comp.subject_isolation === 'single' && hasNoChar)    bonus -= 12; // 배경이 단독 피사체인 경우
            else if (comp.subject_isolation === 'crowded')               bonus -= 22;

            // ② 교전 보너스: 캐릭터 가시성에 비례
            if (cont.scene_type === 'combat') {
              if (hasChar)      bonus += 25;
              else if (hasSmallChar) bonus += 8;
              // 캐릭터 없는 배경 교전 = 보너스 없음
            }

            // ③ 액션 강도: 캐릭터 없는 배경 폭발/이펙트엔 보너스 없음
            if (vf.action_intensity === 'high') {
              if (hasChar)      bonus += 15;
              else if (hasSmallChar) bonus += 5;
            } else if (vf.action_intensity === 'medium' && hasChar) {
              bonus += 6;
            }

            // ④ 캐릭터 크기 보상/패널티 (핵심 가중치)
            if (hasLargeChar)  bonus += 18;
            else if (hasMedChar)   bonus += 10;
            else if (hasSmallChar) bonus -= 18;  // 배경 위주 = 감점
            else if (hasNoChar)    bonus -= 45;  // 캐릭터 없음 = 강한 감점

            // ⑤ 포즈: 캐릭터가 있을 때만 보너스
            if (vf.character_pose === 'dynamic' && (hasChar || hasSmallChar)) bonus += 12;

            if (cont.is_gameplay === false) bonus -= 18;
            break;
          }
          case 'gameplay_cinematic': {
            const hasLargeChar = vf.character_size === 'large';
            const hasMedChar   = vf.character_size === 'medium';
            const hasSmallChar = vf.character_size === 'small';
            const hasNoChar    = vf.character_size === 'none' || !vf.character_size;
            const hasChar      = hasLargeChar || hasMedChar;
            const isCinematicCut = cont.is_gameplay === false;

            // ① 인게임 장면 보너스 (gameplay와 동일)
            if (comp.subject_isolation === 'single' && hasChar)      bonus += 28;
            else if (comp.subject_isolation === 'single' && hasSmallChar) bonus += 8;
            else if (comp.subject_isolation === 'single' && hasNoChar)    bonus -= 12;
            else if (comp.subject_isolation === 'crowded')               bonus -= 22;

            if (cont.scene_type === 'combat') {
              if (hasChar)      bonus += 25;
              else if (hasSmallChar) bonus += 8;
            }

            if (vf.action_intensity === 'high') {
              if (hasChar)      bonus += 15;
              else if (hasSmallChar) bonus += 5;
            } else if (vf.action_intensity === 'medium' && hasChar) {
              bonus += 6;
            }

            if (hasLargeChar)      bonus += 18;
            else if (hasMedChar)   bonus += 10;
            else if (hasSmallChar && !isCinematicCut) bonus -= 18;  // 시네마틱 컷은 small 패널티 면제
            else if (hasNoChar    && !isCinematicCut) bonus -= 45;  // 시네마틱 컷은 none 패널티 면제

            if (vf.character_pose === 'dynamic' && (hasChar || hasSmallChar)) bonus += 12;

            // ② 시네마틱 장면 보너스 (is_gameplay=false 패널티 없음, 대신 보너스)
            if (cont.is_gameplay === false) {
              bonus += 18; // 패널티 제거 + 시네마틱 보너스
              if (comp.rule_of_thirds) bonus += 10;
              if (comp.depth_layers === 'deep') bonus += 10;
              if (vf.ui_clutter_level === 'none') bonus += 8;
              if (cont.scene_type === 'cinematic') bonus += 10;
            }
            break;
          }
          case 'new_item': {
            const iv = vf.item_visibility;
            if (iv === 'prominent') bonus += 55;
            else if (iv === 'partial') bonus += 22;
            else if (iv === 'none') bonus -= 28;
            if (comp.weapon_or_item_present) bonus += 18;
            break;
          }
          case 'cinematic': {
            if (cont.is_gameplay === false) bonus += 22;
            if (comp.rule_of_thirds) bonus += 18;
            if (comp.depth_layers === 'deep') bonus += 18;
            if (vf.ui_clutter_level === 'none') bonus += 18;
            else if (vf.ui_clutter_level === 'high') bonus -= 22;
            if (vf.character_size === 'large') bonus += 12;
            if (comp.negative_space_available && vf.character_size !== 'none') bonus += 10;
            if (cont.scene_type === 'cinematic') bonus += 15;
            break;
          }
          case 'celebrity_solo': {
            const hasRealPerson = cont.real_person_present === true;
            const hasFace       = vf.face_detected === true;
            const charSize      = vf.character_size;
            const hasLarge      = charSize === 'large';
            const hasMed        = charSize === 'medium';
            const hasSmall      = charSize === 'small';
            const hasNone       = charSize === 'none' || !charSize;

            // ① 실제 인물 필수 — 없으면 최대 감점 후 즉시 종료
            if (!hasRealPerson) { bonus -= 55; break; }

            // ② 인물 크기가 핵심 (large/medium이어야 의미 있는 인물 컷)
            if (hasLarge)       bonus += 30;
            else if (hasMed)    bonus += 18;
            else if (hasSmall)  bonus -= 25;  // 인물 있지만 너무 작음
            else if (hasNone)   bonus -= 50;  // 실제 인물이라 주장하지만 크기 없음 = 오분류 의심

            // ③ real_person 추가 확인 (크기가 있을 때만 보너스)
            if (!hasNone && !hasSmall) {
              bonus += 20;
              if (vf.character_types?.includes('real_person') || vf.human_presence?.includes('celebrity')) bonus += 10;
            }

            // ④ 얼굴 가시성 (클로즈업 우선)
            if (hasFace)        bonus += 25;
            else if (!hasNone)  bonus -= 15;  // 인물은 있는데 얼굴 안 보임

            // ⑤ 전신/상반신 노출
            if (vf.subject_reveal === 'full')    bonus += 12;
            else if (vf.subject_reveal === 'partial') bonus += 5;

            // ⑥ 가시성 명확도
            if (vf.character_visibility === 'clear')    bonus += 8;
            else if (vf.character_visibility === 'obscured') bonus -= 10;
            break;
          }
          case 'celebrity_group': {
            const hasRealPerson = cont.real_person_present === true;
            const hasFace       = vf.face_detected === true;
            const charSize      = vf.character_size;
            const hasLarge      = charSize === 'large';
            const hasMed        = charSize === 'medium';
            const hasSmall      = charSize === 'small';
            const hasNone       = charSize === 'none' || !charSize;
            const gs            = vf.group_size;

            // ① 실제 인물 필수
            if (!hasRealPerson) { bonus -= 55; break; }

            // ② 그룹 인원 수 (3~5명 최우선)
            if (gs === 'small_group')  bonus += 30;
            else if (gs === 'duo')     bonus += 22;
            else if (gs === 'solo')    bonus += 8;
            else if (gs === 'large_group') bonus += 12;
            else                       bonus -= 15; // 그룹 감지 안 됨

            // ③ 그룹 전체 크기 핵심 가중치
            if (hasLarge)       bonus += 25;
            else if (hasMed)    bonus += 12;
            else if (hasSmall)  bonus -= 22;  // 인물들이 너무 작음
            else if (hasNone)   bonus -= 50;  // 인물 크기 없음 = 오분류 의심

            // ④ real_person 추가 확인 (크기 있을 때만)
            if (!hasNone && !hasSmall) {
              bonus += 18;
              if (vf.character_types?.includes('real_person') || vf.human_presence?.includes('celebrity')) bonus += 8;
            }

            // ⑤ 얼굴 가시성
            // 그룹 전신샷은 개별 얼굴이 작을 수 있으므로 large/medium 크기면 face 페널티 면제
            if (hasFace) {
              bonus += 20;
            } else if (hasLarge || hasMed) {
              // 그룹이 화면을 크게 차지하면 전신/상반신샷으로 인정 — 얼굴 없어도 ok
              bonus += 0;
            } else {
              bonus -= 12; // 작고 얼굴도 없으면 감점
            }

            // ⑥ 전신/상반신 노출 (그룹샷에서 중요: full = 전신 단체샷)
            if (vf.subject_reveal === 'full')         bonus += 15;
            else if (vf.subject_reveal === 'partial') bonus += 8;

            // ⑦ 가시성 명확도
            if (vf.character_visibility === 'clear')         bonus += 8;
            else if (vf.character_visibility === 'obscured') bonus -= 10;
            break;
          }
          default: break;
        }
        return Math.max(-70, Math.min(70, bonus));
      };

      const scoreFrame = (features, rules, ct) => {
        try {
          let score = scoreFrameBase(features);
          if (rules?.stats?.high_performers) {
            const h = rules.stats.high_performers;
            let rulesBonus = 0;
            if (features.color_features?.brightness !== undefined) rulesBonus += (1 - Math.min(1, Math.abs(features.color_features.brightness - h.avg_brightness) * 3)) * 4;
            if (features.color_features?.saturation !== undefined) rulesBonus += (1 - Math.min(1, Math.abs(features.color_features.saturation - h.avg_saturation) * 3)) * 4;
            if (features.visual_features?.face_detected && h.face_usage > 50) rulesBonus += 4;
            if (features.visual_features?.human_presence?.includes('celebrity')) rulesBonus += 4;
            score = Math.min(100, Math.max(0, score + rulesBonus));
          }
          // 콘텐츠 유형 보너스 (강한 가중치) — gameplay 포함 전 유형에 적용
          if (ct) {
            const ctBonus = scoreContentType(features, ct);
            score = Math.min(130, Math.max(0, score + ctBonus));
          }
          // 셀럽 모드: 실제 인물 없으면 scoreFrameBase가 아무리 높아도 최대 5점으로 하드캡
          if (isCelebrityMode(ct) && features.content?.real_person_present !== true) {
            score = Math.min(score, 5);
          }
          // gameplay_cinematic: 시네마틱 컷(is_gameplay=false)이 scoreFrameBase에서 받은 패널티 복원
          if (ct === 'gameplay_cinematic' && features.content?.is_gameplay === false) {
            score += 14; // is_gameplay=false 패널티 복원 (항상)
            if (features.content?.scene_type === 'lobby') {
              score += 31; // lobby catA(-16) + lobby penalty(-15) 복원
            }
            score = Math.min(130, Math.max(0, score));
          }
          // teasing_3d: 3D 그래픽은 is_gameplay=false가 정상 — 패널티 완전 복원
          if (ct === 'teasing_3d' && features.content?.is_gameplay === false) {
            score += 14; // is_gameplay=false 기본 패널티 복원
            if (features.content?.scene_type === 'lobby') {
              score += 31; // lobby 패널티 복원 (로비 분위기 3D 컷 허용)
            }
            score = Math.min(130, Math.max(0, score));
          }
          // 게임플레이 모드: 캐릭터 없음 → 최대 15점, 작은 캐릭터 단독 → 최대 30점
          // gameplay_cinematic은 시네마틱 컷 특성상 캡 미적용
          if (ct === 'gameplay' || !ct) {
            const charSz = features.visual_features?.character_size;
            const isoVal = features.composition?.subject_isolation;
            if (charSz === 'none') {
              score = Math.min(score, 15);
            } else if (charSz === 'small' && isoVal === 'single') {
              score = Math.min(score, 30);  // 작은 캐릭터 단독: 최대 30점
            } else if (charSz === 'small') {
              score = Math.min(score, 22);  // 작은 캐릭터 다수/군중: 더 강하게 억제
            }
          }
          // ⭐ 사용자 자연어 지시(02 영상 컨셉) 매칭도 반영 — 최우선 가중치
          // user_intent_match는 userContext가 입력된 경우에만 Gemini가 반환함 (0.0~1.0)
          const intentMatch = features.content?.user_intent_match;
          if (typeof intentMatch === 'number' && isFinite(intentMatch)) {
            const m = Math.min(1, Math.max(0, intentMatch));
            // 가중치: 1.0 → +40, 0.5 → 0, 0.0 → -40 (-80 ~ +40 폭으로 사용자 의도 반영)
            const userBonus = (m - 0.5) * 80;
            score = Math.min(130, Math.max(0, score + userBonus));
            // 미스매치 하드캡: 사용자 의도와 거의 무관(<0.25)하면 최대 25점으로 제한
            if (m < 0.25) {
              score = Math.min(score, 25);
            }
            // 완벽 부합(>=0.9)은 다른 패널티가 있어도 최소 70점 보장
            else if (m >= 0.9) {
              score = Math.max(score, 70);
            }
          }
          // 🎬 영상 콘텐츠 대표성(content_fit) 반영 — Video-AI 모드에서 영상 요약 제공 시
          // Gemini가 영상 전체 스토리·분위기를 보고 이 프레임이 핵심을 함축하는지 평가
          const contentFit = features.engagement?.content_fit;
          if (contentFit === 'high') {
            score = Math.min(150, score + 20);
          } else if (contentFit === 'medium') {
            score = Math.min(150, score + 8);
          } else if (contentFit === 'low') {
            score = Math.max(0, score - 10);
          }
          return score;
        } catch { return 50; }
      };

      const getReasons = (features, rules) => {
        const isRealPerson = features.content?.real_person_present === true;
        const hasFace = features.visual_features?.face_detected === true;

        const getCharSizeLabel = () => {
          const cs = features.visual_features?.character_size;
          const cp = features.visual_features?.character_prominence;
          // 실제 인물이 없으면 "인물" 대신 "피사체"로 표시
          const label = isRealPerson ? '인물' : '피사체';
          if (cs === 'large') return `🎯 ${label} 크게 강조됨 (large)`;
          if (cs === 'medium') return `🎯 ${label} 적절히 표시 (medium)`;
          if (cs === 'small') return `⚠️ ${label} 크기 작음 (small)`;
          if (cs === 'none') return `⚠️ ${label} 없음`;
          if (typeof cp === 'number') return cp >= 0.3 ? `🎯 ${label} 점유율 ${Math.round(cp * 100)}%` : `⚠️ ${label} 점유율 낮음 (${Math.round(cp * 100)}%)`;
          return null;
        };
        const getActionLabel = () => {
          const ai = features.visual_features?.action_intensity;
          if (ai === 'high' || (typeof ai === 'number' && ai >= 0.7)) return '💥 고강도 액션/이펙트';
          if (ai === 'medium' || (typeof ai === 'number' && ai >= 0.4)) return '⚡ 중간 강도 액션';
          return null;
        };
        const getUILabel = () => {
          const ul = features.visual_features?.ui_clutter_level;
          const us = features.visual_features?.ui_clutter_score;
          if (ul === 'high' || (typeof us === 'number' && us > 0.5)) return '⚠️ UI/HUD 과다 (감점)';
          if (ul === 'low') return 'UI 일부 노출';
          return null;
        };

        const r = [];
        const sceneType = features.content?.scene_type;

        // 사용자 자연어 지시 매칭도 (최우선 표시)
        const intentMatch = features.content?.user_intent_match;
        if (typeof intentMatch === 'number' && isFinite(intentMatch)) {
          const pct = Math.round(Math.min(1, Math.max(0, intentMatch)) * 100);
          if (intentMatch >= 0.85) r.push(`⭐ 사용자 지시 완벽 부합 (${pct}%)`);
          else if (intentMatch >= 0.6) r.push(`✅ 사용자 지시 부합 (${pct}%)`);
          else if (intentMatch >= 0.35) r.push(`◐ 사용자 지시 부분 부합 (${pct}%)`);
          else r.push(`⚠️ 사용자 지시 미부합 (${pct}%)`);
        }

        // 영상 콘텐츠 대표성 (Video-AI 모드에서 영상 요약 기반)
        const cf = features.engagement?.content_fit;
        if (cf === 'high')   r.push('🎬 영상 핵심 장면 대표 (+20)');
        else if (cf === 'medium') r.push('🎞️ 영상과 관련 (+8)');
        else if (cf === 'low')    r.push('⚠️ 영상 내용과 관련성 낮음 (-10)');

        // 실제 인물 없음 경고 (celebrity 카테고리에서 오인식 방지)
        if (features.content?.real_person_present === false && hasFace === false) {
          r.push('⚠️ 실제 인물 없음 (감점)');
        } else if (isRealPerson && hasFace) {
          r.push('✅ 실제 인물 얼굴 확인');
        } else if (isRealPerson && !hasFace) {
          r.push('👤 실제 인물 (얼굴 미식별)');
        }

        if (sceneType === 'combat') r.push('🔥 교전 장면');
        else if (sceneType === 'victory') r.push('🏆 승리 장면');
        else if (sceneType === 'traversal') r.push('🏃 이동 장면');
        else if (sceneType === 'lobby') r.push('⚠️ 로비/대기 장면 (감점)');
        if (features.content?.is_gameplay === false) r.push('⚠️ 시네마틱/컷씬 (감점)');
        const charSizeLabel = getCharSizeLabel(); if (charSizeLabel) r.push(charSizeLabel);
        // 실제 인물 없으면 "주인공 포커스" 대신 "단독 피사체 포커스"로 표시
        if (features.composition?.subject_isolation === 'single') {
          r.push(isRealPerson ? '👤 단독 주인공 포커스' : '🔲 단독 피사체 포커스');
        } else if (features.composition?.subject_isolation === 'crowded') {
          r.push('⚠️ 군중/원경 장면 (감점)');
        }
        if (features.visual_features?.character_pose === 'dynamic') r.push('⚡ 동적 포즈');
        else if (features.visual_features?.character_pose === 'idle') r.push('⚠️ 정적 포즈 (감점)');
        if (features.visual_features?.character_visibility === 'clear') {
          r.push(isRealPerson ? '인물 명확히 식별됨' : '피사체 명확히 식별됨');
        }
        const actionLabel = getActionLabel(); if (actionLabel) r.push(actionLabel);
        const uiLabel = getUILabel(); if (uiLabel) r.push(uiLabel);
        if (features.composition?.rule_of_thirds) r.push('📐 삼분할 구도');
        if (features.composition?.depth_layers === 'deep') r.push('🏔️ 근경-중경-원경 깊이감');
        else if (features.composition?.depth_layers === 'flat') r.push('⚠️ 평면 배경 (감점)');
        if (features.composition?.negative_space_available && features.visual_features?.character_size !== 'none') r.push('텍스트 여백 확보');
        if (rules?.stats?.high_performers) {
          const h = rules.stats.high_performers;
          if (features.visual_features?.face_detected && h.face_usage > 50) r.push('얼굴 포함 (고성과 패턴)');
          if (features.color_features?.brightness && Math.abs(features.color_features.brightness - h.avg_brightness) < 0.15) r.push('밝기 최적 범위');
          if (features.color_features?.saturation && Math.abs(features.color_features.saturation - h.avg_saturation) < 0.15) r.push('채도 최적 범위');
          if (features.content?.iconic_character_present) r.push('대표 캐릭터 노출');
        }
        return r.length ? r : ['AI 기본 분석'];
      };

      const openZoomModal = (imageUrl, title = '') => setZoomModal({ open: true, imageUrl, title, zoom: 1 });
      const closeZoomModal = () => setZoomModal({ open: false, imageUrl: '', title: '', zoom: 1 });
      const adjustZoom = (delta) => setZoomModal((prev) => ({ ...prev, zoom: Math.min(4, Math.max(0.25, prev.zoom + delta)) }));

      return (
        <div className="space-y-5">
          {!geminiApiKey && (
            <div className="bg-red-50 border border-red-200 rounded-none p-4 text-sm text-red-700 flex items-start">
              <icons.AlertCircle className="w-4 h-4 mr-2" />설정 탭에서 Gemini API 키를 먼저 입력하세요
            </div>
          )}
          <div className="bg-white rounded-none shadow px-8 pt-4 pb-8 steps">

                {/* 영상 선택 (클릭 + 드래그앤드랍) */}
                <div>
                  <div className="sec-head">
                    <div className="sec-head-left">
                      <span className="sec-num">01</span>
                      <h3 className="sec-title">영상 파일 <span className="text-[11px] tracking-[0.15em] uppercase text-black/35 font-bold ml-1.5">VIDEO INPUT</span></h3>
                    </div>
                    <p className="sec-hint">클릭하거나 영상 파일을 끌어다 놓으세요</p>
                  </div>
                  {isElectron ? (
                    <button
                      onClick={handleSelectVideo}
                      onDrop={handleVideoDrop}
                      onDragOver={handleVideoDragOver}
                      onDragEnter={handleVideoDragOver}
                      onDragLeave={handleVideoDragLeave}
                      className={`w-full h-28 border-2 border-dashed rounded-none flex items-center justify-center gap-4 transition-colors ${isDragging ? 'border-[#f9423a] bg-black/5' : 'border-black/15 hover:border-black bg-white'}`}
                    >
                      <icons.Folder className="w-7 h-7 text-black/40" />
                      <div className="text-left">
                        <p className="text-base font-semibold text-black">{videoName || (isDragging ? '여기에 놓으세요' : '영상 파일 선택 또는 드래그')}</p>
                        {videoName && <p className="text-sm text-black/45 mt-0.5">클릭 또는 드래그로 다시 선택</p>}
                        {!videoName && !isDragging && <p className="text-sm text-black/45 mt-0.5">.mp4 .mov .avi .mkv 지원</p>}
                      </div>
                    </button>
                  ) : (
                    <label
                      onDrop={handleVideoDrop}
                      onDragOver={handleVideoDragOver}
                      onDragEnter={handleVideoDragOver}
                      onDragLeave={handleVideoDragLeave}
                      className={`w-full h-28 border-2 border-dashed rounded-none flex items-center justify-center gap-4 cursor-pointer transition-colors ${isDragging ? 'border-[#f9423a] bg-black/5' : 'border-black/15 hover:border-black bg-white'}`}
                    >
                      <icons.Folder className="w-7 h-7 text-black/40" />
                      <div className="text-left">
                        <p className="text-base font-semibold text-black">{videoName || (isDragging ? '여기에 놓으세요' : '영상 파일 선택 또는 드래그')}</p>
                        {videoName && <p className="text-sm text-black/45 mt-0.5">클릭 또는 드래그로 다시 선택</p>}
                        {!videoName && !isDragging && <p className="text-sm text-black/45 mt-0.5">.mp4 .mov .avi .mkv 지원</p>}
                      </div>
                      <input type="file" accept="video/*" onChange={handleVideoFileChange} className="hidden" />
                    </label>
                  )}
                </div>

                {/* 자연어 입력: 영상 컨셉/강조 포인트 (최우선 반영) */}
                <div>
                  <div className="sec-head">
                    <div className="sec-head-left">
                      <span className="sec-num">02</span>
                      <h3 className="sec-title">영상 컨셉 / 강조 포인트 <span className="text-[11px] tracking-[0.15em] uppercase text-black/35 font-bold ml-1.5">CONCEPT</span></h3>
                    </div>
                    <p className="sec-hint">입력 시 03 기본 기준보다 절대 우선</p>
                  </div>
                  <div>
                    <textarea
                      value={userContext}
                      onChange={(e) => setUserContext(e.target.value)}
                      placeholder="예: 신규 캐릭터 출시 영상이야. 새 캐릭터가 돋보이는 컷을 골라줘.&#10;예: 보스 처치 장면 위주로 골라줘. UI가 적게 보이는 컷이면 더 좋아.&#10;예: 표정이 인상적인 클로즈업 위주로 추천해줘."
                      rows={3}
                      className={`w-full rounded-none border px-4 py-3 text-base focus:outline-none resize-none transition placeholder:text-xs placeholder:text-black/25 ${userContext.trim() ? 'border-[#f9423a] bg-red-50/30' : 'border-black/15 focus:border-[#f9423a]'}`}
                    />
                    {userContext.trim() && (
                      <div className="flex justify-end mt-2">
                        <button
                          type="button"
                          onClick={() => setUserContext('')}
                          className="text-sm text-black/45 hover:text-black"
                        >
                          지우기
                        </button>
                      </div>
                    )}
                  </div>
                </div>

                {/* 콘텐츠 유형 선택 (간소화) */}
                <div>
                  <div className="sec-head">
                    <div className="sec-head-left">
                      <span className="sec-num">03</span>
                      <h3 className="sec-title">콘텐츠 유형 <span className="text-[11px] tracking-[0.15em] uppercase text-black/35 font-bold ml-1.5">CONTENT TYPE</span></h3>
                    </div>
                    <p className="sec-hint">{contentType === 'teasing' ? '모션그래픽: 전수 스캔 자동 적용' : 'Video-AI 모드 자동 적용'}</p>
                  </div>
                  <div className="ct-grid">
                    {Object.entries(CONTENT_TYPE_META)
                      .filter(([id]) => ['gameplay', 'teasing', 'cinematic', 'celebrity'].includes(id))  // 4가지 메인 유형만 노출
                      .map(([id, { label, emoji }]) => (
                        <button key={id} type="button"
                          className={`ct-btn ${contentType === id ? 'ct-btn-on' : ''}`}
                          onClick={() => setContentType(id)}
                        >
                          <span>{emoji}</span>
                          <span>{label}</span>
                        </button>
                      ))}
                  </div>
                </div>

                <button
                  className="btn btn-block"
                  onClick={extractThumbnails}
                  disabled={!geminiApiKey || !hasVideo || loading}
                  style={{
                    padding: '1.25rem 1.75rem',
                    fontSize: '1.0625rem',
                    letterSpacing: '0.12em',
                    textAlign: 'center',
                    background: (!geminiApiKey || !hasVideo || loading) ? '#e5e7eb' : '#000',
                    color: (!geminiApiKey || !hasVideo || loading) ? 'rgba(0,0,0,0.40)' : '#fff',
                    opacity: 1,
                    cursor: (!geminiApiKey || !hasVideo || loading) ? 'not-allowed' : 'pointer',
                  }}
                >
                  {isElectron ? 'FFmpeg + AI 분석 시작' : '영상 분석 & 후보 썸네일 추출'}
                </button>
              </div>

              {loading && (
                <div className="bg-slate-50 border border-slate-200 rounded-none p-6">
                  <icons.Loader2 className="w-6 h-6 text-[#f9423a] mx-auto mb-3 animate-spin" />
                  <p className="text-center text-slate-800 font-semibold mb-3">
                    {progress.total > 0 && (
                      <span className="text-[#f9423a] mr-2">[{progress.current}/{progress.total}]</span>
                    )}
                    {progress.msg}
                  </p>
                  {progress.total > 0 && (
                    <div className="w-full bg-slate-200 rounded-full h-2 mb-2">
                      <div className="bg-[#f9423a] h-2 rounded-full transition-all" style={{ width: `${(progress.current / progress.total) * 100}%` }} />
                    </div>
                  )}
                  {/* 단계 체크리스트 — 메인 분석 워크플로우(6단계/5단계)에서만 표시 */}
                  {(progress.total === 6 || progress.total === 5) && (() => {
                    const steps = progress.total === 6
                      ? [
                          '영상 업로드 (Gemini File API)',
                          'Gemini 영상 처리 대기',
                          'AI 핵심 구간 선정',
                          '정밀 프레임 추출 (FFmpeg)',
                          '병렬 정밀 분석',
                          '완료',
                        ]
                      : [
                          '영상 정보 로딩',
                          'FFmpeg 프레임 추출',
                          '프리필터 선별',
                          'Gemini 정밀 분석',
                          '완료',
                        ];
                    const modeLabel = progress.total === 6 ? 'Video-AI 분석 단계' : '전수 스캔 분석 단계';
                    return (
                      <div className="mt-4 pt-4 border-t border-slate-200">
                        <p className="text-xs text-slate-500 mb-3 uppercase tracking-wider font-semibold">{modeLabel}</p>
                        <ul className="space-y-2 text-sm">
                          {steps.map((label, i) => {
                            const stepNum = i + 1;
                            const isDone = stepNum < progress.current;
                            const isActive = stepNum === progress.current;
                            const cls = isDone
                              ? 'text-slate-400'
                              : isActive
                                ? 'text-[#f9423a] font-semibold'
                                : 'text-slate-300';
                            const icon = isDone ? '✓' : isActive ? '▸' : '○';
                            return (
                              <li key={i} className={`flex items-center ${cls}`}>
                                <span className="w-5 inline-block text-center">{icon}</span>
                                <span className="ml-1">{stepNum}. {label}</span>
                                {isActive && <icons.Loader2 className="w-3.5 h-3.5 ml-2 animate-spin" />}
                              </li>
                            );
                          })}
                        </ul>
                      </div>
                    );
                  })()}
                  <div className="flex gap-2 mt-4 justify-center">
                    <button
                      onClick={() => {
                        if (abortControllerRef.current) abortControllerRef.current.abort();
                        setLoading(false);
                        setProgress({ current: 0, total: 0, msg: '사용자가 분석을 취소했습니다' });
                      }}
                      className="btn btn-outline btn-sm" style={{ borderColor: '#f9423a', color: '#f9423a' }}
                    >
                      ✕ 분석 취소
                    </button>
                    <button
                      onClick={() => {
                        if (confirm('현재 진행 중인 분석을 버리고 페이지를 새로고침합니다. 계속하시겠습니까?')) {
                          window.location.reload();
                        }
                      }}
                      className="btn btn-outline btn-sm"
                    >
                      🔄 새로고침
                    </button>
                  </div>
                </div>
              )}

              {extractedFrames && (
                <div className="bg-white rounded-none shadow p-6 space-y-6">
                  <div className="flex items-center gap-3 flex-wrap">
                    <h3 className="text-xl font-semibold">추천 썸네일 TOP {extractedFrames.top.length}</h3>
                    <span className="px-3 py-1 rounded-none text-sm font-medium bg-red-100 text-[#dc352d]">
                      {CONTENT_TYPE_META[effectiveContentType]?.emoji} {CONTENT_TYPE_META[effectiveContentType]?.label} 기준
                    </span>
                    <span className="px-3 py-1 rounded-none text-xs font-medium bg-amber-100 text-amber-700">

                                    </div>

                      </div>

                      const tlDur = tlEnd - tlStart;

                      return (
                        <div className="px-6 py-3 border-b bg-slate-50 flex-shrink-0 select-none"

                          onMouseUp={handleTimelineMouseUp}
                          onMouseLeave={handleTimelineMouseUp}
                        >
                          <div className="flex items-center justify-between text-xs text-slate-400 mb-1.5">
                            <span>{tlStart.toFixed(1)}s</span>
                            {timelinePreviewTs !== null
                              ? <span className="font-medium text-[#f9423a]">→ {timelinePreviewTs.toFixed(2)}s</span>
                              : <span className="text-[#f9423a] font-medium">기준 {contextPreview.baseTimestamp?.toFixed(2)}s ★</span>
                            }
                            <span>{tlEnd.toFixed(1)}s</span>
                          </div>

                                <div className="absolute top-0 h-full bg-red-300 rounded-full"

                            {/* 호버 썸네일 (YouTube 스타일) */}

                              const nearest = pl.length > 0 ? pl.reduce((b, f) => Math.abs(f.timestamp - timelinePreviewTs) < Math.abs(b.timestamp - timelinePreviewTs) ? f : b, pl[0]) : null;

                                <div className="absolute pointer-events-none z-10"
                                  style={{ left: `${toPct(timelinePreviewTs)}%`, bottom: '100%', transform: 'translateX(-50%)', marginBottom: '6px' }}>

                                    <img src={nearest.dataUrl} className="w-full block" alt="" />

                              </div>

                        </div>
                      );
                    })()}

                              <img src={frame.dataUrl} alt={`context-${idx}`} className="w-full object-cover cursor-zoom-in"
                                onClick={() => openZoomModal(frame.dataUrl, `주변 프레임 ${frame.timestamp.toFixed(2)}s`)} />

                                  <button
                                    className="btn btn-primary btn-sm btn-block"
                                    onClick={() => { setEditingFrame(frame); setContextPreview({ open: false, frames: [], baseTimestamp: null, loading: false, error: '' }); }}
                                  >🎨 편집</button>
                                )}
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>

          {/* ── 인간 검토 모달 ──────────────────────────────────────────────── */}

                  </button>
                </div>
              </div>
              {/* 프레임 그리드 */}
              <div className="flex-1 overflow-y-auto p-4">
                <div className="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                  {reviewState.frames.map((frame, idx) => {

                      <div

                        className={`relative cursor-pointer rounded-none overflow-hidden border-4 transition-all ${selected ? 'border-[#f9423a] shadow-lg shadow-red-200' : 'border-transparent opacity-40'}`}
                        onClick={() => toggleReviewFrame(idx)}
                      >
                        <img src={frame.dataUrl} alt={`candidate-${idx}`} className="w-full aspect-video object-cover" />
                        {/* 선택 표시 */}
                        <div className={`absolute top-2 right-2 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold transition-all ${selected ? 'bg-[#f9423a] text-white' : 'bg-white/70 text-slate-400 border border-slate-300'}`}>
                          {selected ? '✓' : idx + 1}
                        </div>
                        {/* 타임스탬프 */}
                        <div className="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-xs px-2 py-1">

                        {!selected && (
                          <div className="absolute inset-0 bg-black/30 flex items-center justify-center">
                            <span className="text-white/70 text-2xl">✕</span>
                          </div>

                      </div>

                  })}
                </div>
              </div>
              {/* 푸터 힌트 */}

              </div>
            </div>
          )}

          {zoomModal.open && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
